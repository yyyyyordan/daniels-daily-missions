<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#5b47e0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Missions" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<title>Daniel's Daily Missions</title>
<style>
  :root {
    --bg1: #6b5bff;
    --bg2: #9f6bff;
    --bg3: #ff7ac6;
    --card: #ffffff;
    --ink: #1a1440;
    --ink-soft: #4a4270;
    --accent: #5b47e0;
    --accent-2: #ff5fa2;
    --mint: #2fd8a8;
    --sun: #ffc857;
    --chip: #f1efff;
    --chip-ink: #4b3fb3;
    --shadow: 0 10px 30px rgba(30, 20, 80, 0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(1200px 800px at 10% -10%, #8a7bff 0%, transparent 60%),
      radial-gradient(900px 700px at 110% 10%, #ff7ac6 0%, transparent 55%),
      linear-gradient(160deg, #5b47e0 0%, #8655e8 60%, #ff6fb3 100%);
    background-attachment: fixed;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap {
    max-width: 620px;
    margin: 0 auto;
    padding: 22px 18px 40px;
  }
  header {
    text-align: center;
    color: #fff;
    padding: 10px 6px 22px;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    margin: 2px 0 6px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .sub {
    margin: 0;
    opacity: 0.92;
    font-size: 15px;
  }
  .date {
    margin-top: 6px;
    font-size: 12px;
    opacity: 0.8;
  }
  .card {
    background: var(--card);
    border-radius: 22px;
    padding: 20px 20px 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    animation: pop 0.35s ease-out both;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 6px;
  }
  .card.ai::before { background: linear-gradient(90deg, #5b47e0, #9f6bff); }
  .card.math::before { background: linear-gradient(90deg, #2fd8a8, #ffc857); }
  .card.trivia::before { background: linear-gradient(90deg, #ff8a3d, #ff5fa2); }
  .card.quote::before { background: linear-gradient(90deg, #ffc857, #ff7ac6); }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 5px 9px;
    border-radius: 999px;
    background: var(--chip);
    color: var(--chip-ink);
  }
  .tag.math { background: #e5fbf3; color: #158a63; }
  .tag.trivia { background: #fff0e4; color: #b3431a; }
  .tag.quote { background: #fff7e0; color: #8a5a00; }
  .icon {
    width: 36px; height: 36px;
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 20px;
    flex: 0 0 auto;
  }
  .icon.ai { background: linear-gradient(135deg, #ece8ff, #f6e8ff); }
  .icon.math { background: linear-gradient(135deg, #e2fbf0, #fff3d6); }
  .icon.trivia { background: linear-gradient(135deg, #ffe4cc, #ffd4e4); }
  .icon.quote { background: linear-gradient(135deg, #fff3d0, #ffdceb); }
  .task {
    font-size: 19px;
    line-height: 1.35;
    font-weight: 700;
    color: var(--ink);
    margin: 4px 0 14px;
  }
  .hint {
    background: #f7f5ff;
    border-left: 4px solid var(--accent);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.45;
  }
  .card.math .hint {
    background: #f2fbf7;
    border-left-color: var(--mint);
  }
  .hint b { color: var(--ink); }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    font-family: inherit;
    font-weight: 700;
    border: 0;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  button:active { transform: scale(0.97); }
  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, #ffd369, #ff7ac6);
    color: #1a1440;
    font-size: 17px;
    padding: 15px 18px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(255, 100, 170, 0.35);
  }
  .btn-ghost {
    background: rgba(255,255,255,0.9);
    color: var(--accent);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
  }
  .answer-row {
    display: flex;
    gap: 8px;
    margin: 0 0 10px;
  }
  .answer-input {
    flex: 1;
    font-family: inherit;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid #e3dffc;
    background: #fbfaff;
    outline: none;
    min-width: 0;
    transition: border-color 0.15s, background 0.15s;
  }
  .answer-input:focus { border-color: var(--mint); background: #fff; }
  .answer-input.ok { border-color: #2fd8a8; background: #eafbf4; }
  .answer-input.no { border-color: #ff7a9a; background: #fff1f5; }
  .check-btn {
    background: linear-gradient(135deg, #2fd8a8, #26b893);
    color: #fff;
    font-size: 15px;
    padding: 0 18px;
    border-radius: 12px;
    box-shadow: 0 6px 14px rgba(47, 216, 168, 0.35);
  }
  .feedback {
    min-height: 20px;
    margin: 0 0 10px;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .feedback.show { opacity: 1; }
  .feedback.ok { color: #158a63; }
  .feedback.no { color: #c23866; }
  .feedback .reveal-link {
    display: inline-block;
    margin-left: 6px;
    color: var(--accent);
    font-weight: 600;
    text-decoration: underline;
    cursor: pointer;
  }
  .done-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .mark {
    flex: 1;
    background: #f3f1ff;
    color: var(--accent);
    padding: 10px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    border: 2px solid transparent;
  }
  .card.math .mark { background: #effaf4; color: #158a63; }
  .card.trivia .mark { background: #ffeede; color: #b3431a; }
  .mark.is-done {
    background: linear-gradient(135deg, #5b47e0, #9f6bff);
    color: #fff;
    border-color: transparent;
  }
  .card.math .mark.is-done {
    background: linear-gradient(135deg, #2fd8a8, #26b893);
    color: #fff;
  }
  .card.trivia .mark.is-done {
    background: linear-gradient(135deg, #ff8a3d, #ff5fa2);
    color: #fff;
  }
  .options {
    display: grid;
    gap: 8px;
    margin-bottom: 10px;
  }
  .opt {
    text-align: left;
    background: #fff5ec;
    color: var(--ink);
    font-size: 16px;
    font-weight: 600;
    padding: 12px 14px;
    border-radius: 12px;
    border: 2px solid transparent;
    width: 100%;
    line-height: 1.3;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .opt .letter {
    display: inline-grid;
    place-items: center;
    width: 26px; height: 26px;
    border-radius: 8px;
    background: #ffdebf;
    color: #b3431a;
    font-size: 13px;
    font-weight: 800;
    flex: 0 0 auto;
  }
  .opt:hover { background: #ffe9d6; }
  .opt.locked { pointer-events: none; }
  .opt.correct {
    background: #e3fbef; border-color: #2fd8a8; color: #158a63;
  }
  .opt.correct .letter { background: #2fd8a8; color: #fff; }
  .opt.wrong {
    background: #ffe4eb; border-color: #ff7a9a; color: #c23866;
  }
  .opt.wrong .letter { background: #ff7a9a; color: #fff; }
  .funfact {
    background: #fff5ec;
    border-left: 4px solid #ff8a3d;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.45;
    margin-bottom: 0;
    display: none;
  }
  .funfact.show { display: block; }
  .funfact b { color: var(--ink); }

  /* Quote card */
  .card.quote { padding-bottom: 16px; }
  .quote-text {
    font-size: 19px;
    line-height: 1.4;
    font-weight: 600;
    color: var(--ink);
    margin: 6px 0 10px;
    font-style: italic;
  }
  .quote-text::before { content: "“"; color: var(--accent-2); font-size: 28px; margin-right: 2px; vertical-align: -4px; }
  .quote-text::after { content: "”"; color: var(--accent-2); font-size: 28px; margin-left: 2px; vertical-align: -4px; }
  .quote-author {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }
  .quote-author::before { content: "— "; }
  .fav-btn {
    background: #fff7e0;
    color: #b37700;
    font-size: 14px;
    padding: 8px 14px;
    border-radius: 10px;
    border: 2px solid transparent;
  }
  .fav-btn.is-fav {
    background: linear-gradient(135deg, #ff5fa2, #ff8a3d);
    color: #fff;
  }
  .celebrate {
    text-align: center;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    margin: 8px 0 18px;
    min-height: 22px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .celebrate.show { opacity: 1; }
  footer {
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    margin-top: 18px;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @media (min-width: 720px) {
    .wrap { padding-top: 40px; }
    h1 { font-size: 34px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">Daily Missions</div>
    <h1>Daniel's Daily Missions</h1>
    <p class="sub">Three quick missions + a quote. Let's go!</p>
    <div class="date" id="date"></div>
  </header>

  <div class="celebrate" id="celebrate"></div>

  <section class="card ai" id="aiCard">
    <div class="row">
      <div class="icon ai">🤖</div>
      <div class="tag">AI Mission</div>
    </div>
    <div class="task" id="aiTask"></div>
    <div class="hint" id="aiHint"></div>
    <div class="done-row">
      <button class="mark" data-mark="ai">Mark done ✓</button>
    </div>
  </section>

  <section class="card math" id="mathCard">
    <div class="row">
      <div class="icon math">🧮</div>
      <div class="tag math">Math Mission</div>
    </div>
    <div class="task" id="mathTask"></div>
    <div class="answer-row">
      <input id="mathInput" class="answer-input" type="text" inputmode="text"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
             placeholder="Type your answer" />
      <button class="check-btn" id="checkBtn">Check</button>
    </div>
    <div class="feedback" id="mathFeedback"></div>
    <div class="hint" id="mathHint"></div>
    <div class="done-row">
      <button class="mark" data-mark="math">Mark done ✓</button>
    </div>
  </section>

  <section class="card trivia" id="triviaCard">
    <div class="row">
      <div class="icon trivia">🎯</div>
      <div class="tag trivia">Trivia Mission</div>
    </div>
    <div class="task" id="triviaQ"></div>
    <div class="options" id="triviaOpts"></div>
    <div class="funfact" id="triviaFact"></div>
    <div class="done-row">
      <button class="mark" data-mark="trivia">Mark done ✓</button>
    </div>
  </section>

  <section class="card quote" id="quoteCard">
    <div class="row">
      <div class="icon quote">✨</div>
      <div class="tag quote">Daily Quote</div>
    </div>
    <div class="quote-text" id="quoteText"></div>
    <div class="quote-author" id="quoteAuthor"></div>
    <div class="done-row">
      <button class="fav-btn" id="favBtn">♡ Favorite</button>
    </div>
  </section>

  <div class="actions">
    <button class="btn-primary" id="newBtn">✨ New missions</button>
  </div>

  <footer>
    Missions refresh anytime. No score, no pressure — just fun.
    <div style="margin-top:10px; opacity:0.85;">Created with love from Dad for Daniel ❤️</div>
  </footer>
</div>

<script>
/* =========================================================================
   Daniel's Daily Missions — task bank
   Built procedurally so we have thousands of combinations and Daniel won't
   see repeats often. Templates are hand-written for a fun 11-year-old tone.
   ========================================================================= */

/* ---------- AI TASK BANK ---------- */

const AI_TOPICS = [
  "dinosaurs","space","sharks","pizza","robots","ninjas","dragons","volcanoes",
  "the ocean","cats","dogs","penguins","octopuses","Mars","black holes","pyramids",
  "Vikings","skateboarding","Minecraft","soccer","basketball","video games",
  "rollercoasters","chocolate","thunderstorms","earthquakes","jungles","deserts",
  "the Arctic","bamboo","knights","castles","pirates","submarines","rockets",
  "satellites","comets","meteors","tornadoes","whales","bees","ants","spiders",
  "bats","wolves","eagles","cheetahs","kangaroos","dolphins","chameleons",
  "lasers","holograms","virtual reality","Lego","Roblox","Mario","Zelda",
  "Pokémon","skiing","swimming","the Moon","Saturn's rings","quicksand",
  "mirrors","magnets","rainbows","clouds","parkour","BMX","pandas","koalas",
  "sloths","crocodiles","T-Rex","meerkats","samurai","aliens","UFOs",
  "the Sahara","the Amazon","the Great Wall","Mount Everest","the Titanic",
  "drones","electric cars","secret agents","spy gadgets","trampolines",
  "roller skates","pet hamsters","YouTube","time travel","parallel universes"
];

const AI_CONCEPTS = [
  "how Wi-Fi works","how rockets fly","how a volcano erupts","how fish sleep",
  "how the internet works","how rainbows form","how magnets work",
  "how your brain remembers things","how airplanes stay up","how GPS knows where you are",
  "how a camera takes a picture","how sound travels","how electricity works",
  "how a 3D printer works","how AI learns","how solar panels work",
  "how a submarine floats or sinks","how bees make honey","how your eyes see color",
  "how touchscreens work","how bridges don't fall down","how thunder happens"
];

const AI_CREATURES = [
  "dragon","wizard","robot","ninja","pirate","alien","detective","astronaut",
  "chef","inventor","explorer","knight","spy","scientist","skater","gamer",
  "shark","dinosaur","fox","wolf","penguin","octopus","ghost","cyborg"
];

const AI_ADJECTIVES = [
  "sneaky","heroic","clumsy","clever","super-fast","tiny","giant","invisible",
  "time-traveling","underwater","space-traveling","glow-in-the-dark","mischievous",
  "legendary","lazy but brilliant","secretly royal","robot-powered","noodle-armed"
];

const AI_SENTENCES = [
  "I am hungry","It is raining","My homework is done","The dog ate my sandwich",
  "I love pizza","School was fun today","I can't find my shoes","The cat stole my sock",
  "I need a snack","My Wi-Fi is slow","I won the game","I am tired"
];

const AI_THINGS = [
  "new ice cream flavor","pet robot","invisible superhero","secret treehouse",
  "brand-new sport","video game boss","magical pet","sneaker design",
  "pizza topping","cereal brand","candy bar","theme park ride","spy gadget",
  "space station","hidden hideout","imaginary island"
];

const AI_HYPOTHETICALS = [
  "gravity turned off for one minute","dogs could talk","school was only 2 hours a day",
  "pizza grew on trees","the sky was green","cats ruled the world",
  "we lived on Mars","homework was illegal","humans could fly",
  "water tasted like lemonade","you could pause time for 10 seconds a day",
  "every kid got a dragon as a pet","money was replaced by LEGO bricks"
];

const AI_STYLES = [
  "a dramatic movie trailer","a pirate","a sports announcer","a Shakespeare play",
  "a cowboy","a robot","a rapper","a tiny mouse","an action hero","a news reporter"
];

const AI_TEMPLATES = [
  { make: t => ({
      task: `Ask AI for 3 cool facts about ${t.topic}.`,
      hint: `Try typing: <b>"Give me 3 cool facts about ${t.topic} that most kids don't know."</b> Ask for another one if a fact sounds boring.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to explain ${t.concept} like you're 11.`,
      hint: `Try: <b>"Explain ${t.concept} to an 11-year-old, and use an example I'd recognize."</b>` }),
    needs: ["concept"] },
  { make: t => ({
      task: `Ask AI to invent a character who is a ${t.adj} ${t.creature}.`,
      hint: `Ask for a <b>name</b>, a <b>special power</b>, and one <b>silly weakness</b>. That's what makes them memorable.` }),
    needs: ["adj","creature"] },
  { make: t => ({
      task: `Ask AI to rewrite the sentence "${t.sentence}" in the style of ${t.style}.`,
      hint: `If it's not funny enough, say <b>"make it even more over-the-top"</b> and try again.` }),
    needs: ["sentence","style"] },
  { make: t => ({
      task: `Ask AI for a joke about ${t.topic}.`,
      hint: `If the joke is weak, say <b>"tell me a funnier one."</b> You're allowed to be picky.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to come up with 5 cool names for a ${t.thing}.`,
      hint: `Pick your favorite, then ask AI <b>"why does that name work?"</b>` }),
    needs: ["thing"] },
  { make: t => ({
      task: `Ask AI to write a tiny 3-sentence story about ${t.topic}.`,
      hint: `Ask for a <b>surprise twist at the end</b>. Twists make stories way better.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI: "What would happen if ${t.hypo}?"`,
      hint: `There's no wrong answer — it's a thought experiment. Ask for <b>3 weird side effects</b>.` }),
    needs: ["hypo"] },
  { make: t => ({
      task: `Ask AI to design a superpower based on ${t.topic}.`,
      hint: `Ask what the <b>weakness</b> of that power would be. Every good superpower has one.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a riddle about ${t.topic}.`,
      hint: `Try to solve it yourself first. If you're stuck, ask for a <b>small clue</b> before the answer.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to compare ${t.topic} and ${t.topic2}. Which would win in a contest?`,
      hint: `Ask AI to pick the <b>contest rules</b> itself — it gets more creative that way.` }),
    needs: ["topic","topic2"] },
  { make: t => ({
      task: `Ask AI for 5 fun questions you could ask your friends about ${t.topic}.`,
      hint: `Pick the best one and actually ask someone today. That's the mission bonus.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to help you invent a brand new ${t.thing}.`,
      hint: `Tell it <b>what problem your invention solves</b>. Good inventions fix something annoying.` }),
    needs: ["thing"] },
  { make: t => ({
      task: `Ask AI to describe ${t.topic} as if it were a video game level.`,
      hint: `Ask for the <b>boss, the power-ups, and the music</b>.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to make up a secret code based on ${t.topic}.`,
      hint: `Ask AI to give you a <b>sample message</b> in the code, then try to decode it.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a tongue twister about ${t.topic}.`,
      hint: `Say it out loud 3 times fast. That's the real test.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to imagine a world where ${t.hypo}. Describe one normal day.`,
      hint: `Ask what <b>breakfast</b> would look like. Small details make worlds feel real.` }),
    needs: ["hypo"] },
  { make: t => ({
      task: `Ask AI to write a short rap about ${t.topic}.`,
      hint: `Ask for it to <b>rhyme</b> and have a beat you can clap to.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a weird fact about ${t.topic} that most people don't know.`,
      hint: `If it sounds fake, ask <b>"is that actually true?"</b> — good skill to practice with AI.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to describe what ${t.topic} would sound like as a song.`,
      hint: `Ask for the <b>instruments, tempo, and mood</b>. Extra: ask for a song title.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to create a mini-quiz (3 questions) about ${t.topic}.`,
      hint: `Try the quiz yourself before checking the answers. See how many you get!` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to design a team mascot for ${t.topic}.`,
      hint: `Ask for the <b>name, outfit, and catchphrase</b>.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to write a movie trailer description for a film about ${t.topic}.`,
      hint: `Ask for a <b>dramatic one-line tagline</b> at the end.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a "would you rather" question about ${t.topic}.`,

function pickDiff(arr, not) {

}

function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); return b === 0 ? a : gcd(b, a % b); }

/* ---------- Answer normalization + checkers ---------- */

function norm(s) {
  return String(s == null ? "" : s).trim().toLowerCase()
    .replace(/\s+/g, " ")
    .replace(/×/g, "*").replace(/÷/g, "/").replace(/−/g, "-")
    .replace(/[,$€£]/g, "");
}

function simplifyFrac(n, d) {
  if (d === 0) return [n, d];
  if (d < 0) { n = -n; d = -d; }
  const g = gcd(n, d) || 1;
  return [n / g, d / g];
}

function parseFrac(raw) {
  const s = norm(raw);
  if (!s) return null;
  let m = s.match(/^(-?\d+)\s+(\d+)\/(\d+)$/); // mixed "3 1/4"
  if (m) {
    const w = parseInt(m[1]), n = parseInt(m[2]), d = parseInt(m[3]);
    const sign = w < 0 ? -1 : 1;
    if (d === 0) return null;
    return [sign * (Math.abs(w) * d + n), d];
  }
  m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if (m) { const d = parseInt(m[2]); if (d === 0) return null; return [parseInt(m[1]), d]; }
  m = s.match(/^-?\d+$/);
  if (m) return [parseInt(s), 1];
  m = s.match(/^(-?)(\d*)\.(\d+)$/);
  if (m) {
    const sign = m[1] === "-" ? -1 : 1;
    const whole = m[2] === "" ? 0 : parseInt(m[2]);
    const frac = m[3];
    const denom = Math.pow(10, frac.length);
    return [sign * (whole * denom + parseInt(frac)), denom];
  }
  return null;
}

// Answer-maker helpers. Each returns { check(input), canonical }.
function ansNum(v) {
  return {
    check: (s) => {
      const t = norm(s);
      if (t === "") return false;
      const n = Number(t);
      if (Number.isFinite(n)) return Math.abs(n - v) < 1e-9;
      return false;
    },
    canonical: (Number.isInteger(v) ? String(v) : String(v))
  };
}
function ansFrac(n, d) {
  const [cn, cd] = simplifyFrac(n, d);
  return {
    check: (s) => {
      const p = parseFrac(s);
      if (!p) return false;
      const [a, b] = simplifyFrac(p[0], p[1]);
      return a === cn && b === cd;
    },
    canonical: cd === 1 ? String(cn) : `${cn}/${cd}`
  };
}
function ansTime(h, m) {
  const canon = `${h}:${String(m).padStart(2, "0")}`;
  return {
    check: (s) => {
      const t = norm(s).replace(/\s*(am|pm)$/, "");
      const mt = t.match(/^(\d{1,2})[:. ](\d{1,2})$/);
      if (!mt) return false;
      const hh = parseInt(mt[1]), mm = parseInt(mt[2]);
      return (hh === h || hh === h % 12 || hh === h + 12) && mm === m;
    },
    canonical: canon
  };
}
function ansRem(q, r) {
  const canon = r === 0 ? String(q) : `${q} R ${r}`;
  return {
    check: (s) => {
      const t = norm(s);
      if (r === 0) { const n = Number(t); return Number.isFinite(n) && n === q; }
      const m1 = t.match(/^(-?\d+)\s*r(?:em(?:ainder)?)?\s*\.?\s*(\d+)$/);
      if (m1) return parseInt(m1[1]) === q && parseInt(m1[2]) === r;
      const m2 = t.match(/^(-?\d+)\s+(\d+)$/); // "5 3"
      if (m2) return parseInt(m2[1]) === q && parseInt(m2[2]) === r;
      return false;
    },
    canonical: canon
  };
}
function ansYesNo(v) {
  return {
    check: (s) => {
      const t = norm(s).split(" ")[0];
      return (v ? ["y","yes","yeah","yep","true"] : ["n","no","nope","false"]).includes(t);
    },
    canonical: v ? "yes" : "no"
  };
}
function ansHM(h, m) {
  // "2 hours 15 minutes" / "2h 15m" / "2:15" / "2 15"
  const canon = `${h}h ${m}m`;
  return {
    check: (s) => {
      const t = norm(s);
      let mt = t.match(/^(\d+)\s*(?:h|hr|hrs|hour|hours)?\s*(\d+)\s*(?:m|min|mins|minute|minutes)?$/);
      if (mt) return parseInt(mt[1]) === h && parseInt(mt[2]) === m;
      mt = t.match(/^(\d+)[:h ](\d+)m?$/);
      if (mt) return parseInt(mt[1]) === h && parseInt(mt[2]) === m;
      return false;
    },
    canonical: canon
  };
}
function ansPrimeFact(n) {
  // Compute canonical factorization
  const factors = [];
  let x = n;
  for (let p = 2; p * p <= x; p++) {
    while (x % p === 0) { factors.push(p); x = x / p; }
  }
  if (x > 1) factors.push(x);
  const canon = factors.join(" × ");
  function isPrime(k) {
    if (k < 2) return false;
    for (let i = 2; i * i <= k; i++) if (k % i === 0) return false;
    return true;
  }
  return {
    check: (s) => {
      const t = norm(s).replace(/\*/g, " ").replace(/\s+/g, " ").trim();
      const parts = t.split(/[\s,]+/).filter(Boolean);
      if (parts.length === 0) return false;
      const nums = parts.map(p => {
        // handle 2^3 notation too
        const m = p.match(/^(\d+)\^(\d+)$/);
        if (m) return { base: parseInt(m[1]), exp: parseInt(m[2]) };
        const n = parseInt(p);
        if (isNaN(n)) return null;
        return { base: n, exp: 1 };
      });
      if (nums.some(v => v === null)) return false;
      let product = 1;
      for (const v of nums) {
        if (!isPrime(v.base)) return false;
        product *= Math.pow(v.base, v.exp);
      }
      return product === n;
    },
    canonical: canon
  };
}
function ansAny(opts) { // opts: array of answer-checker objects
  return {
    check: (s) => opts.some(o => o.check(s)),
    canonical: opts[0].canonical
  };
}

      answer: ansNum(gcd(a, b)),
      hint: `List the factors of each and find the biggest one they share.` };
  },
  // Prime factorization
  () => {
    const n = pick([24, 36, 40, 48, 54, 60, 72, 84, 90, 96]);
    return { task: `Write ${n} as a product of prime numbers. (e.g. 2 × 2 × 3)`,
      answer: ansPrimeFact(n),
      hint: `Keep dividing by small primes (2, 3, 5, 7…). Example: 12 = 2 × 2 × 3.` };
  },
  // Triangle area
  () => {
    const base = pick([4, 6, 8, 10, 12, 14, 16]);
    const height = pick([4, 6, 8, 10, 12, 14]);
    return { task: `A triangle has a base of ${base} cm and a height of ${height} cm. What's its area? (in cm²)`,
      answer: ansNum(base * height / 2),
      hint: `Triangle area = (base × height) ÷ 2.` };
  },

  () => {
    const a = r(3, 8), b = r(3, 8), c = r(3, 8);
    return { task: `A box is ${a} × ${b} × ${c} cm. What's the volume? (in cm³)`,
      answer: ansNum(a * b * c),

  // Rectangle area
  () => {
    const w = r(7, 18), h = r(5, 15);
    return { task: `A rectangle is ${w} cm wide and ${h} cm tall. What's the area? (in cm²)`,
      answer: ansNum(w * h),

  // Rectangle perimeter
  () => {
    const w = r(6, 18), h = r(5, 15);
    return { task: `A rectangle is ${w} cm wide and ${h} cm tall. What's the perimeter? (in cm)`,
      answer: ansNum(2 * (w + h)),
      hint: `Perimeter = 2 × (width + height).` };
  },
  // Sequence
  () => {
    const type = pick(["geo", "add-growing", "square"]);
    if (type === "geo") {
      const start = pick([2, 3, 5]);
      const ratio = pick([2, 3]);
      const seq = [start, start*ratio, start*ratio*ratio, start*ratio*ratio*ratio];
      return { task: `Next number? ${seq.join(", ")}, ?`,
        answer: ansNum(seq[3] * ratio),
        hint: `This one doesn't add a fixed amount — each number is being MULTIPLIED by the same thing.` };
    } else if (type === "add-growing") {
      const start = r(1, 5);
      const seq = [start, start+1, start+3, start+6];
      return { task: `Next number? ${seq.join(", ")}, ?`,
        answer: ansNum(seq[3] + 4),
        hint: `Look at the GAPS between numbers. The gaps grow by 1 each time.` };

      return { task: `Next number? 1, 4, 9, 16, ?`, answer: ansNum(25),

  () => {
    const a = r(15, 40), b = r(3, 9), c = pick([2, 3, 4, 5]), d = r(3, 15);
    // ensure (a * b) / c is integer
    let aa = a;
    while ((aa * b) % c !== 0) aa++;
    const val = (aa * b) / c - d;
    return { task: `Start with ${aa}. Multiply by ${b}. Divide by ${c}. Subtract ${d}. What do you get?`,
      answer: ansNum(val),
      hint: `One step at a time — track the running number. Say it out loud if it helps.` };
  },
  // Average
  () => {
    const n = r(4, 5);
    // ensure divisibility
    const nums = [];
    let sum = 0;
    for (let i = 0; i < n - 1; i++) { const v = r(5, 40); nums.push(v); sum += v; }
    // last one makes sum divisible by n
    const target = Math.round((sum + (n * 25)) / n) * n; // aim near 25n
    let last = target - sum;
    if (last < 5) last += n;
    if (last > 60) last -= n;
    nums.push(last); sum += last;
    return { task: `What's the average of ${nums.join(", ")}?`,
      answer: ansNum(sum / n),
      hint: `Add them all up, then divide by ${n} (how many numbers there are).` };

  () => {

  () => {

  () => {

  () => {

  () => {
    const n = r(120, 980);
    const d = pick([3, 4, 6, 9]);
    return { task: `Is ${n} divisible by ${d}? (yes or no)`,

  },
  // Combinations
  () => {
    const shirts = r(3, 6), pants = r(2, 5), shoes = r(2, 4);
    return { task: `You have ${shirts} shirts, ${pants} pairs of pants, and ${shoes} pairs of shoes. How many different outfits can you make?`,
      answer: ansNum(shirts * pants * shoes),

  }

function buildTrivia() {
  const item = pick(TRIVIA);
  const [q, correct, distractors, fact] = item;
  const opts = [correct, ...distractors];
  // shuffle
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return { q, correct, opts, fact };
}

const els = {
  aiTask: document.getElementById("aiTask"),
  aiHint: document.getElementById("aiHint"),

  mathHint: document.getElementById("mathHint"),

  mathFeedback: document.getElementById("mathFeedback"),
  triviaQ: document.getElementById("triviaQ"),
  triviaOpts: document.getElementById("triviaOpts"),
  triviaFact: document.getElementById("triviaFact"),
  triviaCard: document.getElementById("triviaCard"),
  quoteText: document.getElementById("quoteText"),
  quoteAuthor: document.getElementById("quoteAuthor"),
  quoteCard: document.getElementById("quoteCard"),
  favBtn: document.getElementById("favBtn"),
  newBtn: document.getElementById("newBtn"),
  celebrate: document.getElementById("celebrate"),
  aiCard: document.getElementById("aiCard"),
  mathCard: document.getElementById("mathCard"),
  date: document.getElementById("date")

const state = {
  doneAI: false, doneMath: false, doneTrivia: false,
  lastAI: "", lastMath: "", lastTrivia: "", lastQuote: "",
  currentMath: null, attempts: 0,
  currentTrivia: null, triviaAnswered: false,
  currentQuote: null
};

/* Favorites persisted in localStorage */
function loadFavs() {
  try { return new Set(JSON.parse(localStorage.getItem("ddm_favs") || "[]")); }
  catch (e) { return new Set(); }
}
function saveFavs(set) {
  try { localStorage.setItem("ddm_favs", JSON.stringify([...set])); } catch (e) {}
}
let favs = loadFavs();

function setDate() {
  const d = new Date();
  const opts = { weekday: "long", month: "long", day: "numeric" };
  els.date.textContent = d.toLocaleDateString(undefined, opts);
}

function refresh() {
  let ai, math, trivia, quote, tries = 0;
  do { ai = buildAITask(); tries++; } while (ai.task === state.lastAI && tries < 5);
  tries = 0;
  do { math = buildMathTask(); tries++; } while (math.task === state.lastMath && tries < 5);
  tries = 0;
  do { trivia = buildTrivia(); tries++; } while (trivia.q === state.lastTrivia && tries < 5);
  tries = 0;
  do { quote = buildQuote(); tries++; } while (quote.text === state.lastQuote && tries < 5);

  state.lastAI = ai.task; state.lastMath = math.task;
  state.lastTrivia = trivia.q; state.lastQuote = quote.text;
  state.currentMath = math;
  state.currentTrivia = trivia;
  state.currentQuote = quote;
  state.attempts = 0;
  state.triviaAnswered = false;

  [els.aiCard, els.mathCard, els.triviaCard, els.quoteCard].forEach(c => {
    c.style.animation = "none"; void c.offsetWidth; c.style.animation = "";
  });

  els.aiTask.textContent = ai.task;
  els.aiHint.innerHTML = "💡 " + ai.hint;
  els.mathTask.textContent = math.task;
  els.mathHint.innerHTML = "💡 " + math.hint;

  els.mathInput.value = "";
  els.mathInput.disabled = false;
  els.mathInput.classList.remove("ok", "no");
  els.checkBtn.disabled = false;
  els.checkBtn.textContent = "Check";
  els.mathFeedback.textContent = "";
  els.mathFeedback.className = "feedback";

  renderTrivia();
  renderQuote();

  state.doneAI = false; state.doneMath = false; state.doneTrivia = false;
  document.querySelectorAll(".mark").forEach(b => {
    b.classList.remove("is-done");
    b.textContent = "Mark done ✓";
  });
  els.celebrate.classList.remove("show");
  els.celebrate.textContent = "";
}

function renderTrivia() {
  const t = state.currentTrivia;
  els.triviaQ.textContent = t.q;
  els.triviaOpts.innerHTML = "";
  els.triviaFact.classList.remove("show");
  els.triviaFact.innerHTML = "";
  const letters = ["A", "B", "C", "D"];
  t.opts.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    btn.addEventListener("click", () => handleTrivia(btn, opt));
    els.triviaOpts.appendChild(btn);
  });
}

function handleTrivia(btn, choice) {
  if (state.triviaAnswered) return;
  state.triviaAnswered = true;
  const t = state.currentTrivia;
  const correct = choice === t.correct;
  // lock all, mark correct one, mark chosen if wrong
  document.querySelectorAll(".opt").forEach(b => {
    b.classList.add("locked");
    const label = b.querySelector("span:last-child").textContent;
    if (label === t.correct) b.classList.add("correct");
    else if (b === btn && !correct) b.classList.add("wrong");
  });
  // reveal fun fact
  els.triviaFact.innerHTML = (correct ? "🎉 " : "💡 ") + `<b>Did you know?</b> ${t.fact}`;
  els.triviaFact.classList.add("show");
  // auto-mark done on correct
  if (correct && !state.doneTrivia) {
    const markBtn = document.querySelector('.mark[data-mark="trivia"]');
    state.doneTrivia = true;
    markBtn.classList.add("is-done");
    markBtn.textContent = "Done! ✓";
    updateCelebrate();
  }
}

function quoteKey(q) { return q.text + "|" + q.author; }

function renderQuote() {
  const q = state.currentQuote;
  els.quoteText.textContent = q.text;
  els.quoteAuthor.textContent = q.author;
  const isFav = favs.has(quoteKey(q));
  els.favBtn.classList.toggle("is-fav", isFav);
  els.favBtn.textContent = isFav ? "♥ Favorited" : "♡ Favorite";
}

function toggleFav() {
  const key = quoteKey(state.currentQuote);
  if (favs.has(key)) favs.delete(key);
  else favs.add(key);
  saveFavs(favs);
  renderQuote();
}

const WRONG_NUDGES = [
  "Not quite — take another shot! 💪",
  "Close one. Try again!",
  "Almost! Check the hint 👇",
  "Not yet — you've got this.",
  "Hmm, not it. Give it one more try!"
];
const RIGHT_CHEERS = [
  "✓ Correct! Nice one. 🎉",
  "✓ Boom — nailed it! 💥",
  "✓ That's it! 🧠",
  "✓ Yes! Crushed it. 🔥",
  "✓ You got it. 🏆"
];

function checkMath() {
  const raw = els.mathInput.value;
  if (!raw.trim()) return;
  const task = state.currentMath;
  if (!task || !task.answer) return;

  const ok = task.answer.check(raw);
  state.attempts++;

  if (ok) {
    els.mathInput.classList.remove("no");
    els.mathInput.classList.add("ok");
    els.mathInput.disabled = true;
    els.checkBtn.disabled = true;
    els.checkBtn.textContent = "✓";
    els.mathFeedback.textContent = pick(RIGHT_CHEERS);
    els.mathFeedback.className = "feedback show ok";
    // auto-mark done
    if (!state.doneMath) {
      const btn = document.querySelector('.mark[data-mark="math"]');
      state.doneMath = true;
      btn.classList.add("is-done");
      btn.textContent = "Done! ✓";
      updateCelebrate();
    }
  } else {
    els.mathInput.classList.remove("ok");
    els.mathInput.classList.add("no");
    let msg = pick(WRONG_NUDGES);
    if (state.attempts >= 3) {
      msg += ` <span class="reveal-link" id="revealLink">Show answer</span>`;
    }
    els.mathFeedback.innerHTML = msg;
    els.mathFeedback.className = "feedback show no";
    const rl = document.getElementById("revealLink");
    if (rl) rl.addEventListener("click", revealAnswer);
    // Clear the red state shortly after so they can type again
    setTimeout(() => els.mathInput.classList.remove("no"), 800);
    els.mathInput.select();
  }
}

function revealAnswer() {
  const task = state.currentMath;
  if (!task) return;
  els.mathFeedback.innerHTML = `Answer: <b>${task.answer.canonical}</b>`;
  els.mathFeedback.className = "feedback show no";
  els.mathInput.value = task.answer.canonical;
  els.mathInput.disabled = true;
  els.checkBtn.disabled = true;
}

const CHEERS = [
  "Nice work! 🎉", "Boom — crushed it! 💥", "Legendary. 🏆",
  "You're on fire! 🔥", "Mission complete, agent. 🕶️",
  "Level up! ⬆️", "Sharp thinking! ⚡", "Two for two. Huge. 🚀"
];

function updateCelebrate() {
  if (state.doneAI && state.doneMath && state.doneTrivia) {
    els.celebrate.textContent = pick(CHEERS);
    els.celebrate.classList.add("show");
  }
}

document.querySelectorAll(".mark").forEach(btn => {
  btn.addEventListener("click", () => {
    const kind = btn.dataset.mark;
    if (kind === "ai") state.doneAI = !state.doneAI;
    else if (kind === "math") state.doneMath = !state.doneMath;
    else if (kind === "trivia") state.doneTrivia = !state.doneTrivia;
    const on = kind === "ai" ? state.doneAI : kind === "math" ? state.doneMath : state.doneTrivia;
    btn.classList.toggle("is-done", on);
    btn.textContent = on ? "Done! ✓" : "Mark done ✓";
    updateCelebrate();
  });
});

els.favBtn.addEventListener("click", toggleFav);

els.newBtn.addEventListener("click", refresh);
els.checkBtn.addEventListener("click", checkMath);
els.mathInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); checkMath(); }
});

setDate();
refresh();

// Console sanity (dev): log bank size so we can confirm > 1000 combos.
console.log("AI task combinations available:", aiBankSize().toLocaleString());
console.log("Math templates:", MATH_BUILDERS.length, "(each randomized into hundreds+ of variants)");
