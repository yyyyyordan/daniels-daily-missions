<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#5b47e0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Missions" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />

<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<title>Daniel's Daily Missions</title>
<style>
  :root {
    --bg1: #6b5bff;
    --bg2: #9f6bff;
    --bg3: #ff7ac6;
    --card: #ffffff;
    --ink: #1a1440;
    --ink-soft: #4a4270;
    --accent: #5b47e0;
    --accent-2: #ff5fa2;
    --mint: #2fd8a8;
    --sun: #ffc857;
    --chip: #f1efff;
    --chip-ink: #4b3fb3;
    --shadow: 0 10px 30px rgba(30, 20, 80, 0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(1200px 800px at 10% -10%, #8a7bff 0%, transparent 60%),
      radial-gradient(900px 700px at 110% 10%, #ff7ac6 0%, transparent 55%),
      linear-gradient(160deg, #5b47e0 0%, #8655e8 60%, #ff6fb3 100%);
    background-attachment: fixed;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap {
    max-width: 620px;
    margin: 0 auto;
    padding: 22px 18px 40px;
  }
  header {
    text-align: center;
    color: #fff;
    padding: 10px 6px 22px;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    margin: 2px 0 6px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .sub {
    margin: 0;
    opacity: 0.92;
    font-size: 15px;
  }
  .date {
    margin-top: 6px;
    font-size: 12px;
    opacity: 0.8;
  }
  .card {
    background: var(--card);
    border-radius: 22px;
    padding: 20px 20px 18px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    animation: pop 0.35s ease-out both;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 6px;
  }
  .card.ai::before { background: linear-gradient(90deg, #5b47e0, #9f6bff); }
  .card.math::before { background: linear-gradient(90deg, #2fd8a8, #ffc857); }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 5px 9px;
    border-radius: 999px;
    background: var(--chip);
    color: var(--chip-ink);
  }
  .tag.math { background: #e5fbf3; color: #158a63; }
  .icon {
    width: 36px; height: 36px;
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 20px;
    flex: 0 0 auto;
  }
  .icon.ai { background: linear-gradient(135deg, #ece8ff, #f6e8ff); }
  .icon.math { background: linear-gradient(135deg, #e2fbf0, #fff3d6); }
  .task {
    font-size: 19px;
    line-height: 1.35;
    font-weight: 700;
    color: var(--ink);
    margin: 4px 0 14px;
  }
  .hint {
    background: #f7f5ff;
    border-left: 4px solid var(--accent);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.45;
  }
  .card.math .hint {
    background: #f2fbf7;
    border-left-color: var(--mint);
  }
  .hint b { color: var(--ink); }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    font-family: inherit;
    font-weight: 700;
    border: 0;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  button:active { transform: scale(0.97); }
  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, #ffd369, #ff7ac6);
    color: #1a1440;
    font-size: 17px;
    padding: 15px 18px;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(255, 100, 170, 0.35);
  }
  .btn-ghost {
    background: rgba(255,255,255,0.9);
    color: var(--accent);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
  }
  .done-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .mark {
    flex: 1;
    background: #f3f1ff;
    color: var(--accent);
    padding: 10px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    border: 2px solid transparent;
  }
  .card.math .mark { background: #effaf4; color: #158a63; }
  .mark.is-done {
    background: linear-gradient(135deg, #5b47e0, #9f6bff);
    color: #fff;
    border-color: transparent;
  }
  .card.math .mark.is-done {
    background: linear-gradient(135deg, #2fd8a8, #26b893);
    color: #fff;
  }
  .celebrate {
    text-align: center;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    margin: 8px 0 18px;
    min-height: 22px;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .celebrate.show { opacity: 1; }
  footer {
    text-align: center;
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    margin-top: 18px;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @media (min-width: 720px) {
    .wrap { padding-top: 40px; }
    h1 { font-size: 34px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="badge">Daily Missions</div>
    <h1>Daniel's Daily Missions</h1>
    <p class="sub">Two quick missions. One with AI, one with numbers. Let's go!</p>
    <div class="date" id="date"></div>
  </header>

  <div class="celebrate" id="celebrate"></div>

  <section class="card ai" id="aiCard">

      <div class="icon ai">🤖</div>
      <div class="tag">AI Mission</div>
    </div>
    <div class="task" id="aiTask"></div>
    <div class="hint" id="aiHint"></div>
    <div class="done-row">
      <button class="mark" data-mark="ai">Mark done ✓</button>

  </section>

  <section class="card math" id="mathCard">
    <div class="row">
      <div class="icon math">🧮</div>
      <div class="tag math">Math Mission</div>
    </div>
    <div class="task" id="mathTask"></div>
    <div class="hint" id="mathHint"></div>
    <div class="done-row">
      <button class="mark" data-mark="math">Mark done ✓</button>

  </section>

  <div class="actions">
    <button class="btn-primary" id="newBtn">✨ New missions</button>
  </div>

  <footer>
    Missions refresh anytime. No score, no pressure — just fun.
    <div style="margin-top:10px; opacity:0.85;">Created with love from Dad for Daniel ❤️</div>
  </footer>
</div>

<script>
/* =========================================================================
   Daniel's Daily Missions — task bank
   Built procedurally so we have thousands of combinations and Daniel won't
   see repeats often. Templates are hand-written for a fun 11-year-old tone.
   ========================================================================= */

/* ---------- AI TASK BANK ---------- */

const AI_TOPICS = [
  "dinosaurs","space","sharks","pizza","robots","ninjas","dragons","volcanoes",
  "the ocean","cats","dogs","penguins","octopuses","Mars","black holes","pyramids",

  "rollercoasters","chocolate","thunderstorms","earthquakes","jungles","deserts",

  "satellites","comets","meteors","tornadoes","whales","bees","ants","spiders",
  "bats","wolves","eagles","cheetahs","kangaroos","dolphins","chameleons",
  "lasers","holograms","virtual reality","Lego","Roblox","Mario","Zelda",
  "Pokémon","skiing","swimming","the Moon","Saturn's rings","quicksand",
  "mirrors","magnets","rainbows","clouds","parkour","BMX","pandas","koalas",
  "sloths","crocodiles","T-Rex","meerkats","samurai","aliens","UFOs",
  "the Sahara","the Amazon","the Great Wall","Mount Everest","the Titanic",

const AI_CONCEPTS = [
  "how Wi-Fi works","how rockets fly","how a volcano erupts","how fish sleep",
  "how the internet works","how rainbows form","how magnets work",
  "how your brain remembers things","how airplanes stay up","how GPS knows where you are",
  "how a camera takes a picture","how sound travels","how electricity works",
  "how a 3D printer works","how AI learns","how solar panels work",
  "how a submarine floats or sinks","how bees make honey","how your eyes see color",
  "how touchscreens work","how bridges don't fall down","how thunder happens"
];

const AI_CREATURES = [
  "dragon","wizard","robot","ninja","pirate","alien","detective","astronaut",
  "chef","inventor","explorer","knight","spy","scientist","skater","gamer",
  "shark","dinosaur","fox","wolf","penguin","octopus","ghost","cyborg"
];

const AI_ADJECTIVES = [
  "sneaky","heroic","clumsy","clever","super-fast","tiny","giant","invisible",
  "time-traveling","underwater","space-traveling","glow-in-the-dark","mischievous",
  "legendary","lazy but brilliant","secretly royal","robot-powered","noodle-armed"
];

const AI_SENTENCES = [
  "I am hungry","It is raining","My homework is done","The dog ate my sandwich",
  "I love pizza","School was fun today","I can't find my shoes","The cat stole my sock",
  "I need a snack","My Wi-Fi is slow","I won the game","I am tired"
];

const AI_THINGS = [
  "new ice cream flavor","pet robot","invisible superhero","secret treehouse",
  "brand-new sport","video game boss","magical pet","sneaker design",
  "pizza topping","cereal brand","candy bar","theme park ride","spy gadget",
  "space station","hidden hideout","imaginary island"
];

const AI_HYPOTHETICALS = [
  "gravity turned off for one minute","dogs could talk","school was only 2 hours a day",
  "pizza grew on trees","the sky was green","cats ruled the world",
  "we lived on Mars","homework was illegal","humans could fly",
  "water tasted like lemonade","you could pause time for 10 seconds a day",
  "every kid got a dragon as a pet","money was replaced by LEGO bricks"
];

const AI_STYLES = [
  "a dramatic movie trailer","a pirate","a sports announcer","a Shakespeare play",
  "a cowboy","a robot","a rapper","a tiny mouse","an action hero","a news reporter"
];

const AI_TEMPLATES = [
  { make: t => ({
      task: `Ask AI for 3 cool facts about ${t.topic}.`,
      hint: `Try typing: <b>"Give me 3 cool facts about ${t.topic} that most kids don't know."</b> Ask for another one if a fact sounds boring.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to explain ${t.concept} like you're 11.`,
      hint: `Try: <b>"Explain ${t.concept} to an 11-year-old, and use an example I'd recognize."</b>` }),
    needs: ["concept"] },
  { make: t => ({
      task: `Ask AI to invent a character who is a ${t.adj} ${t.creature}.`,
      hint: `Ask for a <b>name</b>, a <b>special power</b>, and one <b>silly weakness</b>. That's what makes them memorable.` }),
    needs: ["adj","creature"] },
  { make: t => ({
      task: `Ask AI to rewrite the sentence "${t.sentence}" in the style of ${t.style}.`,
      hint: `If it's not funny enough, say <b>"make it even more over-the-top"</b> and try again.` }),
    needs: ["sentence","style"] },
  { make: t => ({
      task: `Ask AI for a joke about ${t.topic}.`,
      hint: `If the joke is weak, say <b>"tell me a funnier one."</b> You're allowed to be picky.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to come up with 5 cool names for a ${t.thing}.`,
      hint: `Pick your favorite, then ask AI <b>"why does that name work?"</b>` }),
    needs: ["thing"] },
  { make: t => ({
      task: `Ask AI to write a tiny 3-sentence story about ${t.topic}.`,
      hint: `Ask for a <b>surprise twist at the end</b>. Twists make stories way better.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI: "What would happen if ${t.hypo}?"`,
      hint: `There's no wrong answer — it's a thought experiment. Ask for <b>3 weird side effects</b>.` }),
    needs: ["hypo"] },
  { make: t => ({
      task: `Ask AI to design a superpower based on ${t.topic}.`,
      hint: `Ask what the <b>weakness</b> of that power would be. Every good superpower has one.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a riddle about ${t.topic}.`,
      hint: `Try to solve it yourself first. If you're stuck, ask for a <b>small clue</b> before the answer.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to compare ${t.topic} and ${t.topic2}. Which would win in a contest?`,
      hint: `Ask AI to pick the <b>contest rules</b> itself — it gets more creative that way.` }),
    needs: ["topic","topic2"] },
  { make: t => ({
      task: `Ask AI for 5 fun questions you could ask your friends about ${t.topic}.`,
      hint: `Pick the best one and actually ask someone today. That's the mission bonus.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to help you invent a brand new ${t.thing}.`,
      hint: `Tell it <b>what problem your invention solves</b>. Good inventions fix something annoying.` }),
    needs: ["thing"] },
  { make: t => ({
      task: `Ask AI to describe ${t.topic} as if it were a video game level.`,
      hint: `Ask for the <b>boss, the power-ups, and the music</b>.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to make up a secret code based on ${t.topic}.`,
      hint: `Ask AI to give you a <b>sample message</b> in the code, then try to decode it.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a tongue twister about ${t.topic}.`,
      hint: `Say it out loud 3 times fast. That's the real test.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to imagine a world where ${t.hypo}. Describe one normal day.`,
      hint: `Ask what <b>breakfast</b> would look like. Small details make worlds feel real.` }),
    needs: ["hypo"] },
  { make: t => ({
      task: `Ask AI to write a short rap about ${t.topic}.`,
      hint: `Ask for it to <b>rhyme</b> and have a beat you can clap to.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a weird fact about ${t.topic} that most people don't know.`,
      hint: `If it sounds fake, ask <b>"is that actually true?"</b> — good skill to practice with AI.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to describe what ${t.topic} would sound like as a song.`,
      hint: `Ask for the <b>instruments, tempo, and mood</b>. Extra: ask for a song title.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to create a mini-quiz (3 questions) about ${t.topic}.`,
      hint: `Try the quiz yourself before checking the answers. See how many you get!` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to design a team mascot for ${t.topic}.`,
      hint: `Ask for the <b>name, outfit, and catchphrase</b>.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to write a movie trailer description for a film about ${t.topic}.`,
      hint: `Ask for a <b>dramatic one-line tagline</b> at the end.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a "would you rather" question about ${t.topic}.`,
      hint: `Answer it yourself, then ask AI what <b>it</b> would pick and why.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to invent a holiday celebrating ${t.topic}.`,
      hint: `Ask for the <b>date, a tradition, and a food</b> people eat that day.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to write a review of ${t.topic} as if it were a restaurant.`,
      hint: `Ask for a <b>star rating out of 5</b> and why.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to list 5 things a ${t.adj} ${t.creature} might keep in their backpack.`,
      hint: `Pick the weirdest one and ask AI <b>what it's used for</b>.` }),
    needs: ["adj","creature"] },
  { make: t => ({
      task: `Ask AI what a day in the life of a ${t.creature} might look like.`,
      hint: `Ask for a <b>morning, afternoon, and evening</b> section.` }),
    needs: ["creature"] }
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickDiff(arr, not) {
  let v; do { v = pick(arr); } while (v === not);
  return v;
}

function buildAITask() {
  const tpl = pick(AI_TEMPLATES);
  const ctx = {};
  if (tpl.needs.includes("topic")) ctx.topic = pick(AI_TOPICS);
  if (tpl.needs.includes("topic2")) ctx.topic2 = pickDiff(AI_TOPICS, ctx.topic);
  if (tpl.needs.includes("concept")) ctx.concept = pick(AI_CONCEPTS);
  if (tpl.needs.includes("creature")) ctx.creature = pick(AI_CREATURES);
  if (tpl.needs.includes("adj")) ctx.adj = pick(AI_ADJECTIVES);
  if (tpl.needs.includes("sentence")) ctx.sentence = pick(AI_SENTENCES);
  if (tpl.needs.includes("thing")) ctx.thing = pick(AI_THINGS);
  if (tpl.needs.includes("hypo")) ctx.hypo = pick(AI_HYPOTHETICALS);
  if (tpl.needs.includes("style")) ctx.style = pick(AI_STYLES);
  return tpl.make(ctx);
}

/* Quick sanity: count the combinatorial space so we know we easily clear 1000. */
function aiBankSize() {
  let total = 0;
  for (const t of AI_TEMPLATES) {
    let n = 1;
    if (t.needs.includes("topic")) n *= AI_TOPICS.length;
    if (t.needs.includes("topic2")) n *= (AI_TOPICS.length - 1);
    if (t.needs.includes("concept")) n *= AI_CONCEPTS.length;
    if (t.needs.includes("creature")) n *= AI_CREATURES.length;
    if (t.needs.includes("adj")) n *= AI_ADJECTIVES.length;
    if (t.needs.includes("sentence")) n *= AI_SENTENCES.length;
    if (t.needs.includes("thing")) n *= AI_THINGS.length;
    if (t.needs.includes("hypo")) n *= AI_HYPOTHETICALS.length;
    if (t.needs.includes("style")) n *= AI_STYLES.length;
    total += n;
  }
  return total;
}

/* ---------- MATH TASK BANK ---------- */

const NAMES = ["Max","Leo","Sam","Mia","Zoe","Jake","Ava","Ben","Ella","Finn","Ivy","Noah","Ruby","Theo","Luna","Kai","Nina","Owen","Pia","Rafi"];
const ITEMS = ["stickers","cookies","marbles","trading cards","LEGO bricks","apples","coins","candies","pencils","erasers","arrows","gems","slime jars","donuts","snacks"];
const PLACES = ["shelves","boxes","bags","trays","crates","baskets"];

function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

const MATH_BUILDERS = [
  // 4-digit addition with carries
  () => {
    const a = r(1450, 8999), b = r(1375, 8999);
    return { task: `${a} + ${b} = ?`,
      hint: `Stack them column by column: ones, tens, hundreds, thousands. Carry whenever a column tops 9.` };
  },
  // 4-digit subtraction with borrowing
  () => {
    const a = r(3500, 9999), b = r(1250, 3499);
    return { task: `${a} − ${b} = ?`,
      hint: `Try rounding ${b} up to a nicer number, subtract that, then add back the difference.` };
  },
  // 3-digit × 1-digit
  () => {
    const a = r(124, 899), b = r(4, 9);
    return { task: `${a} × ${b} = ?`,
      hint: `Split: (${Math.floor(a/100)*100} × ${b}) + (${Math.floor((a%100)/10)*10} × ${b}) + (${a%10} × ${b}). Then add.` };
  },
  // 2-digit × 2-digit (wider range)
  () => {
    const a = r(23, 69), b = r(14, 49);
    return { task: `${a} × ${b} = ?`,
      hint: `Box method: split ${b} into ${Math.floor(b/10)*10} + ${b%10}. Do ${a} × ${Math.floor(b/10)*10}, then ${a} × ${b%10}, then add.` };
  },
  // 3-digit × 2-digit (stretch)
  () => {
    const a = r(105, 299), b = r(12, 29);
    return { task: `${a} × ${b} = ?`,
      hint: `Split ${b} into tens + ones. Multiply ${a} by each piece separately, then add the two results.` };
  },
  // Long division (2-digit divisor)
  () => {
    const b = r(12, 19), q = r(18, 79), rem = r(0, b-1);
    const a = b * q + rem;
    return { task: `${a} ÷ ${b} = ? ${rem === 0 ? "" : "(give quotient and remainder)"}`,
      hint: `Estimate first: how many ${b}s fit roughly into ${a}? Refine, then find what's left over.` };
  },
  // Order of operations with exponent
  () => {
    const a = r(3, 9), b = r(2, 6), c = r(3, 12), d = r(2, 15);
    return { task: `${a} + ${b}² × ${c} − ${d} = ?`,
      hint: `PEMDAS: exponents first (${b}²), then the multiplication, THEN work left to right with + and −.` };
  },
  // Parentheses + division
  () => {
    const a = r(3, 12), b = r(4, 18), c = r(2, 6), d = r(2, 5);
    const inner = a + b;
    const div = d * r(2, 6);
    return { task: `(${a} + ${b}) × ${c} − ${div} ÷ ${d} = ?`,
      hint: `Two jobs at once: solve (${a} + ${b}) and ${div} ÷ ${d} FIRST, then do × and − left to right.` };
  },
  // Exponents (bigger)
  () => {
    const n = r(11, 20);
    return { task: `What is ${n}²?`,
      hint: `${n}² = ${n} × ${n}. Trick: (${n})² = (${n-1})² + (${n-1}) + (${n}) — or just split ${n} into ${Math.floor(n/10)*10} + ${n%10} and expand.` };
  },
  // Cubes (bigger)
  () => {
    const n = r(5, 10);
    return { task: `What is ${n}³?`,
      hint: `${n}³ = ${n} × ${n} × ${n}. Do ${n} × ${n} = ${n*n} first, then ${n*n} × ${n}.` };
  },
  // Square roots (perfect — including up to 20²)
  () => {
    const n = pick([81, 121, 144, 169, 196, 225, 256, 289, 324, 361, 400]);
    return { task: `√${n} = ?`,
      hint: `What number times itself gives ${n}? Useful squares: 13²=169, 14²=196, 15²=225, 16²=256, 17²=289, 18²=324, 19²=361, 20²=400.` };
  },
  // Powers of 2 / recognizing
  () => {
    const exp = r(6, 10);
    return { task: `What is 2^${exp}?`,
      hint: `Double it step by step: 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024. Count ${exp} doublings starting from 2¹=2.` };
  },
  // Negative numbers
  () => {
    const a = r(4, 25), b = r(a+3, a+40);
    return { task: `${a} − ${b} = ?`,
      hint: `${a} is smaller than ${b}, so the answer is negative. Do ${b} − ${a} and put a minus sign on it.` };
  },
  // Negative arithmetic
  () => {
    const a = r(5, 30), b = r(5, 30);
    return { task: `−${a} + ${b} = ?`,
      hint: `Think of a number line. Start at −${a}, then jump ${b} to the right. Does it cross zero?` };
  },
  // Algebra — x on both sides
  () => {
    const x = r(4, 15), a = r(3, 7), b = r(1, a-1), c = r(2, 20);
    // a*x + c = b*x + (a-b)*x*... let's keep it cleaner:
    // Build: a*x + c = b*x + d  where d = (a-b)*x + c
    const d = (a - b) * x + c;
    return { task: `Solve for x:  ${a}x + ${c} = ${b}x + ${d}`,
      hint: `Get all the x's on one side. Subtract ${b}x from both sides, then isolate x.` };
  },
  // Algebra — two-step with division
  () => {
    const x = r(4, 20), a = r(2, 6), b = r(3, 15);
    const rhs = (x + b) * a; // so  a(x + b) = rhs => x = rhs/a - b
    return { task: `Solve for x:  ${a}(x + ${b}) = ${rhs}`,
      hint: `Two ways: either distribute the ${a} first, or divide both sides by ${a} to undo it.` };
  },
  // Algebra — negative coefficient
  () => {
    const x = r(3, 12), a = r(2, 6), b = r(5, 25);
    const rhs = b - a * x;
    return { task: `Solve for x:  ${b} − ${a}x = ${rhs}`,
      hint: `Subtract ${b} from both sides (careful with signs!), then divide by −${a}.` };
  },
  // Fractions — add different denominators (coprime)
  () => {
    const pairs = [[2,3],[2,5],[3,4],[3,5],[4,5],[3,7],[4,7],[5,6],[5,7],[5,8]];
    const [d1, d2] = pick(pairs);
    const a = r(1, d1 - 1), b = r(1, d2 - 1);
    return { task: `${a}/${d1} + ${b}/${d2} = ?  (as a fraction, simplified)`,
      hint: `Common denominator = ${d1} × ${d2} = ${d1*d2}. Rewrite both fractions over ${d1*d2}, then add.` };
  },
  // Fractions — subtract mixed numbers
  () => {
    const d = pick([3, 4, 5, 6, 8]);
    const w1 = r(3, 8), w2 = r(1, w1 - 1);
    const n1 = r(1, d-1), n2 = r(n1+1, d);
    // ensure w1 n1/d > w2 n2/d — if n2 > n1 we'll need a borrow, which is the point
    return { task: `${w1} ${n1}/${d} − ${w2} ${n2 === d ? d-1 : n2}/${d} = ?`,
      hint: `Top fraction is smaller, so borrow 1 from the whole number (that's ${d}/${d} extra on top). Then subtract.` };
  },
  // Fraction × fraction
  () => {
    const n1 = r(1, 5), d1 = r(n1+1, 8);
    const n2 = r(1, 5), d2 = r(n2+1, 8);
    return { task: `${n1}/${d1} × ${n2}/${d2} = ?  (simplify)`,
      hint: `Multiply tops, multiply bottoms. Then simplify by dividing top and bottom by any shared factor.` };
  },
  // Fraction ÷ fraction
  () => {
    const n1 = r(1, 5), d1 = r(n1+1, 8);
    const n2 = r(1, 4), d2 = r(n2+1, 7);
    return { task: `${n1}/${d1} ÷ ${n2}/${d2} = ?  (simplify)`,
      hint: `Dividing fractions = multiply by the reciprocal. Flip the second fraction upside down, then multiply.` };
  },
  // Fraction of a number
  () => {
    const d = pick([3, 4, 5, 6, 8]);
    const n = r(1, d-1);
    const whole = d * r(3, 12);
    return { task: `What is ${n}/${d} of ${whole}?`,
      hint: `Divide ${whole} by ${d} first to find 1/${d}. Then multiply by ${n}.` };
  },
  // Percent (trickier %)
  () => {
    const pct = pick([12, 15, 18, 22, 35, 45, 65, 85]);
    const base = pick([40, 60, 80, 120, 150, 200, 240, 300]);
    return { task: `What is ${pct}% of ${base}?`,
      hint: `Find 10% (divide by 10) and 1% (divide by 100). Build ${pct}% by combining. E.g. 18% = 10% + 5% + 3%.` };
  },
  // Percent — reverse (harder)
  () => {
    const pct = pick([15, 20, 25, 30, 40, 60]);
    const whole = pick([40, 60, 80, 100, 120, 150, 200]);
    const part = (pct * whole) / 100;
    return { task: `${part} is ${pct}% of what number?`,
      hint: `Set it up: part ÷ percent × 100 = whole. Or: "1% = part ÷ ${pct}", then × 100.` };
  },
  // Percent change / increase
  () => {
    const base = pick([40, 50, 60, 80, 100, 120, 150, 200]);
    const pct = pick([15, 20, 25, 30, 40]);
    return { task: `A $${base} jacket is marked up by ${pct}%. What's the new price?`,
      hint: `New price = original + (${pct}% of original). Or shortcut: multiply by 1.${pct < 10 ? "0"+pct : pct}.` };
  },
  // Percent discount
  () => {
    const base = pick([40, 60, 80, 120, 150, 200, 250]);
    const pct = pick([15, 20, 25, 30, 35, 40]);
    return { task: `A $${base} game is ${pct}% off. What's the sale price?`,
      hint: `Sale price = original − (${pct}% of original). Or: pay (${100-pct}%) of $${base}.` };
  },
  // Decimals
  () => {
    const a = (r(150, 899) / 100).toFixed(2);
    const b = (r(75, 599) / 100).toFixed(2);
    return { task: `${a} + ${b} = ?`,
      hint: `Line up the decimal points. Add like normal — the decimal stays in the same column.` };
  },
  // Decimals subtraction
  () => {
    const a = r(400, 900) / 10;
    const b = r(50, 300) / 10;
    return { task: `${a.toFixed(1)} − ${b.toFixed(1)} = ?`,
      hint: `Line up the decimal points. Borrow across the decimal just like you would across any digit.` };
  },
  // Decimal × whole
  () => {
    const a = (r(12, 89) / 10).toFixed(1);
    const b = r(4, 9);
    return { task: `${a} × ${b} = ?`,
      hint: `Ignore the decimal, multiply as whole numbers, then put the decimal point back (one place from the right).` };
  },
  // Multi-step word problem
  () => {
    const name = pick(NAMES), pack = r(8, 16), packs = r(5, 12), gave = r(5, 20), kept = r(3, 9), item = pick(ITEMS);
    return { task: `${name} buys ${packs} packs of ${item}, ${pack} per pack. ${name} gives ${gave} to a friend and splits the rest equally among ${kept} cousins. How many does each cousin get?`,
      hint: `Three steps: (1) total = packs × per-pack, (2) subtract the ${gave} given away, (3) divide what's left by ${kept}.` };
  },
  // Rate / speed
  () => {
    const speed = pick([40, 50, 60, 65, 70, 80]);
    const hours = r(2, 5);
    return { task: `A car drives ${speed} km/h for ${hours} hours. How far does it go?`,
      hint: `Distance = speed × time. ${speed} × ${hours}.` };
  },
  // Time word problem
  () => {
    const hStart = r(7, 11), mStart = pick([0, 15, 30, 45]);
    const dur = r(75, 185);
    let endM = mStart + dur;
    let endH = hStart + Math.floor(endM / 60);
    endM = endM % 60;
    return { task: `A movie starts at ${hStart}:${String(mStart).padStart(2,"0")} and lasts ${dur} minutes. What time does it end?`,
      hint: `Convert ${dur} min into hours and minutes first (${Math.floor(dur/60)}h ${dur%60}m), then add to the start time.` };
  },
  // Money problem
  () => {
    const price = (r(175, 650) / 100), qty = r(3, 6);
    const paid = Math.ceil(price * qty / 5) * 5 + 5;
    return { task: `You buy ${qty} items at $${price.toFixed(2)} each and pay with $${paid}. How much change?`,
      hint: `First find the total cost (${qty} × $${price.toFixed(2)}). Then subtract from $${paid}.` };
  },
  // LCM
  () => {
    const a = pick([4, 6, 8, 9]), b = pick([6, 9, 10, 12, 15]);
    return { task: `What's the smallest number that is a multiple of BOTH ${a} and ${b}? (LCM)`,
      hint: `List multiples of each. The first one that appears in both lists is the LCM.` };
  },
  // GCD / factors
  () => {
    const a = pick([12, 18, 24, 30, 36, 42, 48]);
    const b = pick([16, 20, 24, 28, 32, 36, 40]);
    return { task: `What's the largest number that divides BOTH ${a} and ${b} evenly? (GCF)`,
      hint: `List the factors of each and find the biggest one they share. (Answer is the GCF = ${gcd(a,b)}… but try before peeking at the numbers!)` };
  },
  // Prime / factorization
  () => {
    const n = pick([24, 36, 40, 48, 54, 60, 72, 84, 90, 96]);
    return { task: `Write ${n} as a product of prime numbers.`,
      hint: `Keep dividing by small primes (2, 3, 5, 7…). Example: 12 = 2 × 2 × 3.` };
  },
  // Perimeter & area combined
  () => {
    const w = r(6, 18), h = r(5, 15);
    return { task: `A rectangle is ${w} cm wide and ${h} cm tall. What's the area AND perimeter?`,
      hint: `Area = w × h. Perimeter = 2 × (w + h). Give both.` };
  },
  // Triangle area
  () => {
    const base = r(6, 16), height = r(4, 14);
    return { task: `A triangle has a base of ${base} cm and a height of ${height} cm. What's its area?`,
      hint: `Triangle area = (base × height) ÷ 2.` };
  },
  // Volume (cube/box)
  () => {
    const a = r(3, 8), b = r(3, 8), c = r(3, 8);
    return { task: `A box is ${a} × ${b} × ${c} cm. What's the volume?`,
      hint: `Volume of a box = length × width × height.` };
  },
  // Sequence — harder (geometric or quadratic-ish)
  () => {
    const type = pick(["geo", "add-growing", "square"]);
    if (type === "geo") {
      const start = pick([2, 3, 5]);
      const ratio = pick([2, 3]);
      const seq = [start, start*ratio, start*ratio*ratio, start*ratio*ratio*ratio];
      return { task: `Next number? ${seq.join(", ")}, ?`,
        hint: `This one doesn't add a fixed amount — each number is being MULTIPLIED by the same thing.` };
    } else if (type === "add-growing") {
      const start = r(1, 5);
      const seq = [start, start+1, start+3, start+6]; // +1, +2, +3
      return { task: `Next number? ${seq.join(", ")}, ?`,
        hint: `Look at the GAPS between numbers. The gaps are growing in a pattern.` };
    } else {
      const seq = [1, 4, 9, 16];
      return { task: `Next number? ${seq.join(", ")}, ?`,
        hint: `These are famous — each one is a number multiplied by itself.` };
    }
  },
  // Mental math chain (harder)
  () => {
    const a = r(15, 40), b = r(5, 12), c = r(2, 6), d = r(3, 15);
    return { task: `Start with ${a}. Multiply by ${b}. Divide by ${c}. Subtract ${d}. What do you get?`,
      hint: `One step at a time — track the running number. Say it out loud if it helps.` };
  },
  // Average
  () => {
    const n = r(4, 6);
    const nums = Array.from({length: n}, () => r(5, 40));
    return { task: `What's the average of ${nums.join(", ")}?`,
      hint: `Add them all up, then divide by ${n} (how many numbers there are).` };
  },
  // Probability (basic)
  () => {
    const red = r(2, 6), blue = r(2, 6), green = r(2, 5);
    const total = red + blue + green;
    return { task: `A bag has ${red} red, ${blue} blue, and ${green} green marbles. You grab one without looking. What's the probability it's blue? (as a fraction, simplified)`,
      hint: `Probability = favorable / total. That's ${blue}/${total}. Simplify if top and bottom share a factor.` };
  },
  // Rounding (decimal)
  () => {
    const n = (r(1234, 9876) / 100).toFixed(2);
    return { task: `Round ${n} to the nearest whole number.`,
      hint: `Look at the tenths digit (right after the decimal). If it's 5 or more, round up.` };
  },
  // Unit conversion
  () => {
    const which = pick(["mtocm", "mltoL", "mintohr", "gtokg"]);
    if (which === "mtocm") { const m = r(3, 15); return { task: `${m} meters = ? centimeters`, hint: `1 meter = 100 cm. Multiply by 100.` }; }
    if (which === "mltoL") { const ml = r(1500, 9500); return { task: `${ml} mL = ? liters (as a decimal)`, hint: `1 L = 1000 mL. Divide by 1000 (move the decimal left 3 places).` }; }
    if (which === "mintohr") { const m = r(75, 260); return { task: `${m} minutes = ? hours and minutes`, hint: `Divide by 60. The quotient is hours, the remainder is minutes.` }; }
    const g = r(1500, 9500); return { task: `${g} grams = ? kilograms (as a decimal)`, hint: `1 kg = 1000 g. Divide by 1000.` };
  },
  // Divisibility / logic
  () => {
    const n = r(120, 980);
    const d = pick([3, 4, 6, 9]);
    return { task: `Is ${n} divisible by ${d}? (yes or no, and why)`,
      hint: d === 3 ? `Trick: add the digits of ${n}. If that sum is divisible by 3, so is ${n}.` :
            d === 9 ? `Trick: add the digits. If the sum is divisible by 9, so is the number.` :
            d === 4 ? `Trick: look at the last TWO digits. If that number is divisible by 4, so is the whole thing.` :
                      `Trick: it must be divisible by BOTH 2 and 3. Even? And digit sum divisible by 3?` };
  },
  // Counting / combinations (gentle)
  () => {
    const shirts = r(3, 6), pants = r(2, 5), shoes = r(2, 4);
    return { task: `You have ${shirts} shirts, ${pants} pairs of pants, and ${shoes} pairs of shoes. How many different outfits can you make?`,
      hint: `Multiply the choices together: shirts × pants × shoes.` };
  }
];

function buildMathTask() {
  return pick(MATH_BUILDERS)();
}

/* Math combinatorial space: each builder uses randomized ranges giving
   anywhere from ~60 to thousands of variants each. Easily > 1000 unique
   problems across the bank of ${MATH_BUILDERS.length} templates. */

/* ---------- APP ---------- */

const els = {
  aiTask: document.getElementById("aiTask"),
  aiHint: document.getElementById("aiHint"),
  mathTask: document.getElementById("mathTask"),
  mathHint: document.getElementById("mathHint"),
  newBtn: document.getElementById("newBtn"),
  celebrate: document.getElementById("celebrate"),
  aiCard: document.getElementById("aiCard"),
  mathCard: document.getElementById("mathCard"),
  date: document.getElementById("date")
};

const state = { doneAI: false, doneMath: false, lastAI: "", lastMath: "" };

function setDate() {
  const d = new Date();
  const opts = { weekday: "long", month: "long", day: "numeric" };
  els.date.textContent = d.toLocaleDateString(undefined, opts);
}

function refresh() {
  let ai, math, tries = 0;
  do { ai = buildAITask(); tries++; } while (ai.task === state.lastAI && tries < 5);
  tries = 0;
  do { math = buildMathTask(); tries++; } while (math.task === state.lastMath && tries < 5);
  state.lastAI = ai.task; state.lastMath = math.task;

  els.aiCard.style.animation = "none"; els.mathCard.style.animation = "none";
  // force reflow to restart animation
  void els.aiCard.offsetWidth; void els.mathCard.offsetWidth;
  els.aiCard.style.animation = ""; els.mathCard.style.animation = "";

  els.aiTask.textContent = ai.task;
  els.aiHint.innerHTML = "💡 " + ai.hint;
  els.mathTask.textContent = math.task;
  els.mathHint.innerHTML = "💡 " + math.hint;

  state.doneAI = false; state.doneMath = false;
  document.querySelectorAll(".mark").forEach(b => {
    b.classList.remove("is-done");
    b.textContent = "Mark done ✓";
  });
  els.celebrate.classList.remove("show");
  els.celebrate.textContent = "";
}

const CHEERS = [
  "Nice work! 🎉", "Boom — crushed it! 💥", "Legendary. 🏆",
  "You're on fire! 🔥", "Mission complete, agent. 🕶️",
  "Level up! ⬆️", "Sharp thinking! ⚡", "Two for two. Huge. 🚀"
];

function updateCelebrate() {
  if (state.doneAI && state.doneMath) {
    els.celebrate.textContent = pick(CHEERS);
    els.celebrate.classList.add("show");
  }
}

document.querySelectorAll(".mark").forEach(btn => {
  btn.addEventListener("click", () => {
    const kind = btn.dataset.mark;
    if (kind === "ai") state.doneAI = !state.doneAI;
    if (kind === "math") state.doneMath = !state.doneMath;
    const on = kind === "ai" ? state.doneAI : state.doneMath;
    btn.classList.toggle("is-done", on);
    btn.textContent = on ? "Done! ✓" : "Mark done ✓";
    updateCelebrate();
  });
});

els.newBtn.addEventListener("click", refresh);

setDate();
refresh();

// Console sanity (dev): log bank size so we can confirm > 1000 combos.
console.log("AI task combinations available:", aiBankSize().toLocaleString());
console.log("Math templates:", MATH_BUILDERS.length, "(each randomized into hundreds+ of variants)");
</script>
</body>
</html>
