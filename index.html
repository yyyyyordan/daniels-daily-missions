<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#06060d" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f6f2e9" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#f6f2e9" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Missions" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<title>Daniel's Daily Missions</title>
<script>
  // Set data-theme synchronously BEFORE styles apply (no FOUC).
  (function () {
    try {
      var stored = localStorage.getItem("ddm-theme");
      var sysDark = matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = (stored === "light" || stored === "dark") ? stored : (sysDark ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    } catch (e) {
      document.documentElement.setAttribute("data-theme", "light");
    }
  })();
</script>
<style>
/* =============================================================
   DANIEL'S DAILY MISSIONS — ARCADE GLOW
   Single-file, vanilla CSS. System fonts only. iOS Safari + PWA.
   ============================================================= */

/* 01 · TOKENS */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Menlo", "Cascadia Mono", Consolas, monospace;

  --bg:        #f6f2e9;
  --bg-grad-a: #ffffff;
  --bg-grad-b: #ece5d4;
  --ink:       #0c0d18;
  --ink-2:     rgba(12,13,24,0.65);
  --ink-3:     rgba(12,13,24,0.42);
  --rule:      rgba(12,13,24,0.08);

  --card:      #ffffff;
  --card-sub:  #f7f5ee;
  --card-shadow:
    0 1px 0 rgba(12,13,24,0.04),
    0 18px 40px -22px rgba(15,5,50,0.32);

  --mint:      #1bc99e;
  --mint-hi:   #38f0c2;
  --gold:      #ffd24a;
  --pink:      #e23a8d;
  --pink-hi:   #ff5fa2;
  --violet:    #7c5cff;
  --violet-hi: #a99cff;
  --orange:    #ff9d3a;

  --on-mint:   #04261d;
  --on-gold:   #1a1820;

  /* slot-1 variant accents */
  --coral:    #ff5470;
  --coral-hi: #ff8a99;
  --cyan:     #0bc4d1;
  --cyan-hi:  #4de1ec;
  --indigo:   #5b8def;
  --joke:     #ffb13b;
  --joke-hi:  #ffd24a;
  /* boss battle */
  --boss:     #d12454;
  --boss-hi:  #ff4d7f;
  --boss-deep:#3a0c2c;

  --stripe-ai:     linear-gradient(90deg, var(--violet-hi) 0%, var(--violet) 100%);
  --stripe-photo:  linear-gradient(90deg, var(--coral-hi) 0%, var(--coral) 100%);
  --stripe-riddle: linear-gradient(90deg, var(--cyan-hi) 0%, var(--indigo) 100%);
  --stripe-joke:   linear-gradient(90deg, var(--joke-hi) 0%, var(--orange) 100%);
  --stripe-math:   linear-gradient(90deg, var(--mint-hi) 0%, var(--gold) 100%);
  --stripe-trivia: linear-gradient(90deg, var(--orange) 0%, var(--pink) 100%);
  --stripe-quote:  linear-gradient(90deg, var(--gold) 0%, var(--pink-hi) 100%);
  --stripe-boss:   linear-gradient(90deg, var(--violet) 0%, var(--boss) 50%, var(--gold) 100%);

  --r-card:  22px;
  --r-ctrl:  14px;
  --r-pill:  999px;

  --scanline-light: rgba(0,0,0,0.04);
  --scanline-dark:  rgba(255,255,255,0.025);
  --scanline:       var(--scanline-light);
}
[data-theme="dark"] {
  --bg:        #06060d;
  --bg-grad-a: #1a1b2a;
  --bg-grad-b: #06060d;
  --ink:       #f1f1f5;
  --ink-2:     rgba(241,241,245,0.72);
  --ink-3:     rgba(241,241,245,0.48);
  --rule:      rgba(255,255,255,0.06);
  --card:      #15172a;
  --card-sub:  #0c0e1d;
  --card-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 24px 50px -22px rgba(0,0,0,0.7);
  --scanline:  var(--scanline-dark);
}

/* 02 · PAGE SHELL */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  color: var(--ink);
  background:
    radial-gradient(120% 60% at 50% -10%, var(--bg-grad-a) 0%, var(--bg) 40%, var(--bg-grad-b) 100%);
  background-attachment: fixed;
  min-height: 100vh;
  min-height: 100dvh;
  padding: max(env(safe-area-inset-top), 16px) 0 max(env(safe-area-inset-bottom), 16px);
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(
    to bottom, transparent 0 3px, var(--scanline) 3px 4px
  );
  pointer-events: none;
  z-index: 0;
}
main {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 18px 32px;
}

.app-header { position: relative; padding: 8px 4px 22px; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--ink-2);
}
.eyebrow .pip {
  width: 8px; height: 8px;
  background: var(--mint-hi);
  box-shadow: 0 0 10px var(--mint-hi);
}
[data-theme="dark"] .eyebrow .pip {
  box-shadow: 0 0 14px var(--mint-hi), 0 0 4px var(--mint-hi);
}
.title {
  font-size: clamp(34px, 9vw, 44px);
  font-weight: 800; letter-spacing: -0.025em; line-height: 0.98;
  margin: 8px 0 0;
}
.title .slash { color: var(--ink-3); font-weight: 700; }
.sub {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.18em;
  margin-top: 10px; color: var(--ink-3);
}

.theme-toggle {
  position: absolute; top: 4px; right: 0;
  appearance: none; border: 0;
  width: 50px; height: 30px;
  border-radius: var(--r-pill);
  background: rgba(12,13,24,0.08);
  padding: 3px; cursor: pointer; font: inherit;
  transition: background 200ms ease;
}
[data-theme="dark"] .theme-toggle { background: rgba(255,255,255,0.08); }
.theme-toggle .knob {
  width: 24px; height: 24px;
  border-radius: 50%; background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.18);
  display: grid; place-items: center; font-size: 13px;
  transition: transform 220ms cubic-bezier(.34,1.56,.64,1), background 200ms ease, color 200ms ease;
  transform: translateX(0);
}
[data-theme="dark"] .theme-toggle .knob {
  background: #1a1b2a; color: var(--gold);
  transform: translateX(20px);
}
.theme-toggle .icon-sun  { display: block; }
.theme-toggle .icon-moon { display: none; }
[data-theme="dark"] .theme-toggle .icon-sun  { display: none; }
[data-theme="dark"] .theme-toggle .icon-moon { display: block; }

.app-footer {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10.5px; letter-spacing: 0.18em;
  color: var(--ink-3);
  margin-top: 22px; padding-bottom: 6px;
  text-transform: uppercase;
}
.app-footer .heart { color: var(--pink-hi); letter-spacing: 0; }

/* 03 · MISSION CARDS */
.mission {
  position: relative;
  background: var(--card);
  border-radius: var(--r-card);
  overflow: hidden;
  box-shadow: var(--card-shadow);
  margin-bottom: 16px;
  isolation: isolate;
}
.mission::before {
  content: ""; position: absolute;
  inset: 0 0 auto 0; height: 4px;
  background: var(--stripe); z-index: 2;
}
.mission::after {
  content: ""; position: absolute;
  inset: 0 0 auto 0; height: 4px;
  z-index: 3;
  background: linear-gradient(90deg, transparent 0%, transparent 60%, rgba(255,255,255,0.7) 78%, transparent 100%);
  transform: translateX(-100%);
  animation: stripe-shine 5s linear infinite;
  pointer-events: none;
}
@keyframes stripe-shine {
  0%   { transform: translateX(-100%); }
  60%, 100% { transform: translateX(120%); }
}

.mission.ai     { --stripe: var(--stripe-ai);     --accent: var(--violet); --accent-hi: var(--violet-hi); }
.mission.photo  { --stripe: var(--stripe-photo);  --accent: var(--coral);  --accent-hi: var(--coral-hi);  }
.mission.riddle { --stripe: var(--stripe-riddle); --accent: var(--indigo); --accent-hi: var(--cyan-hi);   }
.mission.joke   { --stripe: var(--stripe-joke);   --accent: var(--orange); --accent-hi: var(--joke-hi);   }
.mission.math   { --stripe: var(--stripe-math);   --accent: var(--mint);   --accent-hi: var(--mint-hi);   }
.mission.trivia { --stripe: var(--stripe-trivia); --accent: var(--pink);   --accent-hi: var(--pink-hi);   }
.mission.quote  { --stripe: var(--stripe-quote);  --accent: var(--gold);   --accent-hi: var(--pink-hi);   }

.mission-inner { padding: 20px 22px 22px; }

.mission-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.mission-label {
  font-family: var(--font-mono);
  font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
  color: var(--accent);
  display: inline-flex; align-items: center; gap: 8px;
}
[data-theme="dark"] .mission-label {
  color: var(--accent-hi);
  text-shadow: 0 0 8px color-mix(in oklab, var(--accent-hi), transparent 70%);
}
.mission-label::before { content: "▸"; opacity: 0.8; }
.mission-meta {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.16em;
  color: var(--ink-3);
}

.mission-q {
  font-size: 21px; font-weight: 800;
  line-height: 1.25; letter-spacing: -0.015em;
  margin: 6px 0 4px;
  color: var(--ink);
}
.mission-q em { font-style: italic; }
.mission-q .num { font-family: var(--font-mono); padding: 0 3px; }
.mission-eg {
  font-family: var(--font-mono);
  font-size: 12.5px; color: var(--ink-3);
  margin: 0 0 16px;
}
.mission-eg:empty { display: none; }

.hint {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--r-ctrl);
  background: color-mix(in oklab, var(--accent), transparent 92%);
  border-left: 3px solid var(--accent);
  display: flex; gap: 10px;
  font-size: 13.5px; line-height: 1.45;
  color: var(--ink);
}
[data-theme="dark"] .hint {
  background: color-mix(in oklab, var(--accent-hi), transparent 90%);
  border-left-color: var(--accent-hi);
  color: var(--ink-2);
}
.hint .h-lbl {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.2em; font-weight: 700;
  color: var(--accent);
  display: block; margin-bottom: 3px;
  text-transform: uppercase;
}
[data-theme="dark"] .hint .h-lbl { color: var(--accent-hi); }
.hint b, .hint strong { color: var(--ink); }

.mark-done {
  appearance: none; border: 0; width: 100%;
  margin-top: 14px; padding: 14px 12px;
  background: color-mix(in oklab, var(--accent), transparent 90%);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 700; letter-spacing: 0.16em;
  border-radius: var(--r-ctrl);
  cursor: pointer; text-transform: uppercase;
  transition: transform 120ms ease, background 160ms ease;
}
.mark-done:active { transform: scale(0.985); }
[data-theme="dark"] .mark-done {
  background: color-mix(in oklab, var(--accent-hi), transparent 88%);
  color: var(--accent-hi);
}
.mission.done .mark-done {
  background: color-mix(in oklab, var(--accent), transparent 78%);
  color: var(--accent);
}

/* 04 · CARD-SPECIFIC */
/* AI copy */
.ai-prompt-row { display: flex; gap: 10px; align-items: stretch; margin-top: 4px; }
.ai-copy {
  appearance: none; border: 0;
  padding: 0 18px; height: 52px;
  background: linear-gradient(180deg, var(--violet-hi), var(--violet));
  color: #fff;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  border-radius: var(--r-ctrl); cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 20px -8px color-mix(in oklab, var(--violet), transparent 50%);
  transition: transform 120ms ease, box-shadow 180ms ease;
  flex-shrink: 0;
}
[data-theme="dark"] .ai-copy {
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--violet-hi), transparent 60%),
              0 12px 28px -8px color-mix(in oklab, var(--violet-hi), transparent 50%);
}
.ai-copy:active { transform: scale(0.97); }
.ai-copy.copied { background: linear-gradient(180deg, var(--mint-hi), var(--mint)); color: var(--on-mint); }

/* Math */
.math-input-wrap { display: flex; gap: 10px; align-items: stretch; position: relative; }
.math-input {
  flex: 1; height: 54px;
  border-radius: var(--r-ctrl);
  border: 1.5px solid var(--rule);
  background: var(--card-sub);
  padding: 0 16px;
  font-family: var(--font-mono);
  font-size: 17px; font-weight: 600;
  color: var(--ink);
  outline: none; caret-color: var(--accent);
  -webkit-appearance: none; appearance: none;
  min-width: 0;
}
[data-theme="dark"] .math-input {
  caret-color: var(--accent-hi);
  border-color: rgba(255,255,255,0.06);
}
.math-input::placeholder { color: var(--ink-3); }
.math-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 80%);
}
[data-theme="dark"] .math-input:focus {
  border-color: var(--accent-hi);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent-hi), transparent 80%);
}

.math-check {
  appearance: none; border: 0;
  height: 54px; padding: 0 22px;
  background: linear-gradient(180deg, var(--mint-hi), var(--mint));
  color: var(--on-mint);
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 800; letter-spacing: 0.06em;
  border-radius: var(--r-ctrl); cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 20px -8px color-mix(in oklab, var(--mint), transparent 40%);
  transition: transform 120ms ease, filter 180ms ease;
  flex-shrink: 0;
}
[data-theme="dark"] .math-check {
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--mint-hi), transparent 60%),
              0 12px 28px -8px color-mix(in oklab, var(--mint-hi), transparent 40%);
}
.math-check:active { transform: scale(0.97); }
.math-check:disabled { opacity: 0.5; cursor: not-allowed; }

.math-state {
  margin-top: 12px; min-height: 0;
  font-family: var(--font-mono);
  font-size: 12.5px; letter-spacing: 0.06em;
  display: none;
}
.math-state.show { display: block; animation: pop-in 280ms cubic-bezier(.34,1.56,.64,1); }
.math-state.correct { color: var(--mint); }
[data-theme="dark"] .math-state.correct { color: var(--mint-hi); }
.math-state.wrong { color: var(--pink); }
[data-theme="dark"] .math-state.wrong { color: var(--pink-hi); }
.math-state .reveal-link {
  margin-left: 8px;
  color: var(--violet);
  cursor: pointer; text-decoration: underline;
  font-weight: 700;
}
[data-theme="dark"] .math-state .reveal-link { color: var(--violet-hi); }
@keyframes pop-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.xp-burst {
  position: absolute; right: 8px; top: -6px;
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 800; letter-spacing: 0.14em;
  color: var(--gold);
  text-shadow: 0 0 14px color-mix(in oklab, var(--gold), transparent 50%);
  pointer-events: none;
  opacity: 0; transform: translateY(0) scale(0.9);
  white-space: nowrap;
}
.xp-burst.fire { animation: xp-fly 1100ms cubic-bezier(.2,.7,.2,1) forwards; }
@keyframes xp-fly {
  0%   { opacity: 0; transform: translateY(8px) scale(0.85); }
  20%  { opacity: 1; transform: translateY(-4px) scale(1.08); }
  100% { opacity: 0; transform: translateY(-72px) scale(0.95); }
}
.mission.celebrate::before { animation: stripe-pulse 900ms ease-out 1; }
@keyframes stripe-pulse {
  0%   { filter: brightness(1) saturate(1); }
  35%  { filter: brightness(1.6) saturate(1.4); }
  100% { filter: brightness(1) saturate(1); }
}
.math-input-wrap.shake { animation: shake 380ms ease; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(2px); }
}

/* Trivia */
.trivia-options {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 8px;
}
.trivia-opt {
  appearance: none; border: 0;
  display: flex; align-items: center; gap: 14px;
  width: 100%;
  padding: 14px 16px;
  background: var(--card-sub);
  border: 1.5px solid transparent;
  border-radius: var(--r-ctrl);
  font: inherit; font-size: 15px; font-weight: 600;
  color: var(--ink); cursor: pointer; text-align: left;
  letter-spacing: -0.005em;
  transition: transform 120ms ease, border-color 160ms ease, background 160ms ease;
}
.trivia-opt:active { transform: scale(0.99); }
.trivia-opt .key {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 800; letter-spacing: 0.1em;
  width: 26px; height: 26px;
  border-radius: 8px;
  display: grid; place-items: center;
  background: color-mix(in oklab, var(--accent), transparent 85%);
  color: var(--accent);
  flex-shrink: 0;
}
[data-theme="dark"] .trivia-opt .key {
  background: color-mix(in oklab, var(--accent-hi), transparent 80%);
  color: var(--accent-hi);
}
.trivia-opt[aria-pressed="true"] {
  border-color: var(--accent);
  background: color-mix(in oklab, var(--accent), transparent 92%);
}
.trivia-opt.correct {
  border-color: var(--mint);
  background: color-mix(in oklab, var(--mint), transparent 88%);
}
.trivia-opt.correct .key { background: var(--mint); color: var(--on-mint); }
.trivia-opt.wrong {
  border-color: var(--pink);
  background: color-mix(in oklab, var(--pink), transparent 90%);
}
.trivia-opt.wrong .key { background: var(--pink); color: #fff; }

.trivia-reveal {
  display: none;
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--r-ctrl);
  background: color-mix(in oklab, var(--accent), transparent 92%);
  border-left: 3px solid var(--accent);
  font-size: 13.5px; line-height: 1.45;
  color: var(--ink);
}
[data-theme="dark"] .trivia-reveal {
  background: color-mix(in oklab, var(--accent-hi), transparent 90%);
  border-left-color: var(--accent-hi);
  color: var(--ink-2);
}
.trivia-reveal.show { display: block; animation: pop-in 280ms cubic-bezier(.34,1.56,.64,1); }
.trivia-reveal .h-lbl {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.2em; font-weight: 700;
  color: var(--accent);
  display: block; margin-bottom: 3px;
  text-transform: uppercase;
}
[data-theme="dark"] .trivia-reveal .h-lbl { color: var(--accent-hi); }

/* Quote */
.quote-text {
  font-size: 20px; font-weight: 700;
  line-height: 1.35; letter-spacing: -0.01em;
  margin: 8px 0 12px;
  font-style: italic;
}
.quote-text::before, .quote-text::after {
  font-family: var(--font-mono);
  font-style: normal;
  color: var(--accent);
  font-weight: 800;
}
.quote-text::before { content: "\201C"; margin-right: 2px; }
.quote-text::after  { content: "\201D"; margin-left: 2px; }
.quote-author {
  font-family: var(--font-mono);
  font-size: 12px; letter-spacing: 0.06em;
  color: var(--ink-2);
  margin-bottom: 4px;
}
.quote-author::before { content: "— "; color: var(--ink-3); }
.favorite-btn {
  appearance: none; border: 1.5px solid var(--rule);
  background: transparent;
  color: var(--ink-2);
  margin-top: 14px;
  padding: 10px 16px;
  border-radius: var(--r-pill);
  font-family: var(--font-mono);
  font-size: 11.5px; font-weight: 700; letter-spacing: 0.14em;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  text-transform: uppercase;
  transition: transform 120ms ease, border-color 160ms ease, color 160ms ease, background 160ms ease;
}
.favorite-btn:active { transform: scale(0.97); }
.favorite-btn .heart { transition: transform 220ms cubic-bezier(.34,1.56,.64,1); }
.favorite-btn[aria-pressed="true"] {
  background: color-mix(in oklab, var(--pink-hi), transparent 86%);
  border-color: var(--pink-hi);
  color: var(--pink-hi);
}
.favorite-btn[aria-pressed="true"] .heart { transform: scale(1.25); }

/* Slot-1 variant action buttons (Photo/Riddle/Joke share patterns with AI) */
.slot1-action {
  appearance: none; border: 0;
  padding: 0 18px; height: 52px;
  color: #fff;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
  border-radius: var(--r-ctrl); cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  transition: transform 120ms ease, box-shadow 180ms ease;
  flex-shrink: 0;
}
.slot1-action:active { transform: scale(0.97); }
.mission.photo  .slot1-action { background: linear-gradient(180deg, var(--coral-hi), var(--coral));   color: #2a0010; box-shadow: 0 8px 20px -8px color-mix(in oklab, var(--coral),  transparent 50%); }
.mission.riddle .slot1-action { background: linear-gradient(180deg, var(--cyan-hi),  var(--indigo));  color: #fff;    box-shadow: 0 8px 20px -8px color-mix(in oklab, var(--indigo), transparent 50%); }
.mission.joke   .slot1-action { background: linear-gradient(180deg, var(--joke-hi),  var(--orange));  color: #2a1400; box-shadow: 0 8px 20px -8px color-mix(in oklab, var(--orange), transparent 50%); }
.slot1-action.revealed { background: linear-gradient(180deg, #d6d4cd, #b8b6ae) !important; color: #0c0d18 !important; }

.slot1-reveal {
  display: none;
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--r-ctrl);
  background: color-mix(in oklab, var(--accent), transparent 92%);
  border-left: 3px solid var(--accent);
  font-size: 15px; line-height: 1.4;
  color: var(--ink);
  font-weight: 600;
}
[data-theme="dark"] .slot1-reveal {
  background: color-mix(in oklab, var(--accent-hi), transparent 90%);
  border-left-color: var(--accent-hi);
  color: var(--ink);
}
.slot1-reveal.show { display: block; animation: pop-in 280ms cubic-bezier(.34,1.56,.64,1); }
.slot1-reveal .h-lbl {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 0.2em; font-weight: 700;
  color: var(--accent);
  display: block; margin-bottom: 4px;
  text-transform: uppercase;
}
[data-theme="dark"] .slot1-reveal .h-lbl { color: var(--accent-hi); }
.slot1-action-row { display: flex; gap: 10px; align-items: stretch; margin-top: 14px; flex-wrap: wrap; }
.slot1-action-row .mark-done { margin-top: 0; flex: 1; min-width: 140px; }

/* ============== BOSS BATTLE ============== */
.boss-card {
  position: relative;
  background: var(--card);
  border-radius: var(--r-card);
  overflow: hidden;
  box-shadow: var(--card-shadow);
  margin-bottom: 18px;
  isolation: isolate;
}
.boss-card::before {
  content: ""; position: absolute;
  inset: 0 0 auto 0; height: 4px;
  background: var(--stripe-boss); z-index: 2;
}
.boss-card::after {
  content: ""; position: absolute;
  inset: 0 0 auto 0; height: 4px;
  z-index: 3;
  background: linear-gradient(90deg, transparent 0%, transparent 60%, rgba(255,255,255,0.7) 78%, transparent 100%);
  transform: translateX(-100%);
  animation: stripe-shine 5s linear infinite;
  pointer-events: none;
}
.boss-inner { padding: 18px 22px 20px; }
.boss-eyebrow {
  font-family: var(--font-mono);
  font-size: 10.5px; font-weight: 800; letter-spacing: 0.22em;
  color: var(--boss);
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 6px;
  text-transform: uppercase;
}
[data-theme="dark"] .boss-eyebrow {
  color: var(--boss-hi);
  text-shadow: 0 0 10px color-mix(in oklab, var(--boss-hi), transparent 70%);
}
.boss-eyebrow .boss-day {
  color: var(--ink-2);
  font-weight: 700;
}
.boss-title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.018em;
  line-height: 1.15;
  margin: 4px 0 4px;
  color: var(--ink);
}
.boss-tagline {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-3);
  margin: 0 0 10px;
}
.boss-dots {
  display: flex; gap: 8px;
  margin: 8px 0 14px;
}
.boss-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: color-mix(in oklab, var(--boss), transparent 86%);
  border: 1.5px solid color-mix(in oklab, var(--boss), transparent 60%);
  transition: all 200ms ease;
}
.boss-dot.filled {
  background: var(--boss);
  border-color: var(--boss);
  box-shadow: 0 0 10px color-mix(in oklab, var(--boss-hi), transparent 50%);
}
[data-theme="dark"] .boss-dot.filled {
  background: var(--boss-hi);
  border-color: var(--boss-hi);
  box-shadow: 0 0 14px color-mix(in oklab, var(--boss-hi), transparent 40%);
}
.boss-dot.today {
  background: color-mix(in oklab, var(--gold), transparent 50%);
  border-color: var(--gold);
  animation: boss-dot-pulse 1.8s ease-in-out infinite;
}
@keyframes boss-dot-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.18); box-shadow: 0 0 14px var(--gold); }
}
.boss-nudge {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.35;
  margin: 4px 0 14px;
  color: var(--ink);
}
.boss-nudge .today-tag {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.2em;
  font-weight: 800;
  color: var(--boss);
  background: color-mix(in oklab, var(--boss), transparent 88%);
  padding: 3px 8px;
  border-radius: 6px;
  margin-right: 8px;
  text-transform: uppercase;
  vertical-align: middle;
}
[data-theme="dark"] .boss-nudge .today-tag {
  color: var(--boss-hi);
  background: color-mix(in oklab, var(--boss-hi), transparent 84%);
}
.boss-mark {
  appearance: none; border: 0;
  width: 100%;
  padding: 15px 16px;
  background: linear-gradient(135deg, var(--boss-hi) 0%, var(--boss) 100%);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 800; letter-spacing: 0.14em;
  border-radius: var(--r-ctrl);
  cursor: pointer;
  text-transform: uppercase;
  box-shadow: 0 10px 22px -10px color-mix(in oklab, var(--boss), transparent 30%);
  transition: transform 120ms ease;
}
.boss-mark:active { transform: scale(0.985); }
.boss-mark.done-today {
  background: color-mix(in oklab, var(--boss), transparent 82%);
  color: var(--boss);
  cursor: default;
  box-shadow: none;
}
[data-theme="dark"] .boss-mark.done-today {
  background: color-mix(in oklab, var(--boss-hi), transparent 80%);
  color: var(--boss-hi);
}
.boss-card.defeated {
  background: linear-gradient(135deg, color-mix(in oklab, var(--boss), transparent 90%) 0%, color-mix(in oklab, var(--gold), transparent 92%) 100%);
}
[data-theme="dark"] .boss-card.defeated {
  background: linear-gradient(135deg, color-mix(in oklab, var(--boss-hi), transparent 80%) 0%, color-mix(in oklab, var(--gold), transparent 84%) 100%);
}
.boss-card.defeated .boss-eyebrow { color: var(--gold); }
[data-theme="dark"] .boss-card.defeated .boss-eyebrow {
  color: var(--gold);
  text-shadow: 0 0 14px color-mix(in oklab, var(--gold), transparent 50%);
}
.boss-defeated-stamp {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: var(--gold);
  text-transform: uppercase;
  text-shadow: 0 0 24px color-mix(in oklab, var(--gold), transparent 50%);
  margin: 10px 0 4px;
}
.boss-next-up {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  text-transform: uppercase;
  margin-top: 10px;
}

/* Big celebration XP burst (boss finale) */
.xp-burst-boss {
  position: fixed;
  left: 50%; top: 40%;
  transform: translate(-50%, -50%) scale(0.8);
  font-family: var(--font-mono);
  font-size: 32px; font-weight: 800; letter-spacing: 0.1em;
  color: var(--gold);
  text-shadow: 0 0 24px color-mix(in oklab, var(--gold), transparent 30%),
               0 0 60px color-mix(in oklab, var(--boss-hi), transparent 50%);
  opacity: 0;
  pointer-events: none;
  z-index: 1000;
  white-space: nowrap;
}
.xp-burst-boss.fire { animation: boss-xp-fly 1800ms cubic-bezier(.2,.7,.2,1) forwards; }
@keyframes boss-xp-fly {
  0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
  15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  60%  { opacity: 1; transform: translate(-50%, -60%) scale(1.0); }
  100% { opacity: 0; transform: translate(-50%, -120%) scale(0.95); }
}

/* New missions hero */
.new-missions {
  appearance: none; border: 0;
  display: block; width: 100%;
  margin-top: 22px; padding: 18px 22px;
  background: linear-gradient(135deg, var(--violet-hi) 0%, var(--pink-hi) 50%, var(--gold) 100%);
  color: #0c0d18;
  font-size: 17px; font-weight: 800; letter-spacing: 0.02em;
  border-radius: 18px; cursor: pointer;
  box-shadow:
    0 18px 32px -16px color-mix(in oklab, var(--violet), transparent 30%),
    0 1px 0 rgba(255,255,255,0.4) inset;
  position: relative; overflow: hidden;
  transition: transform 140ms ease;
}
.new-missions:active { transform: scale(0.985); }
.new-missions::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
  transform: translateX(-100%);
  animation: stripe-shine 4s linear infinite;
  pointer-events: none;
}
[data-theme="dark"] .new-missions {
  color: #0c0d18;
  box-shadow:
    0 18px 32px -10px color-mix(in oklab, var(--pink-hi), transparent 40%),
    0 0 0 1px rgba(255,255,255,0.18) inset;
}
.new-missions .label { position: relative; z-index: 1; }

.status-line {
  font-family: var(--font-mono);
  font-size: 11px; letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  text-align: center;
  margin-top: 14px;
}
.status-line .streak { color: var(--gold); font-weight: 700; }

@media (prefers-reduced-motion: reduce) {
  .mission::after, .new-missions::after { animation: none; }
  .xp-burst.fire { animation-duration: 1ms; }
  .math-input-wrap.shake { animation: none; }
}
</style>
</head>
<body>
<main>
  <!-- BOSS BATTLE (above Mission Brief) -->
  <section class="boss-card" id="bossCard">
    <div class="boss-inner" id="bossInner">
      <!-- populated by JS -->
    </div>
  </section>

  <header class="app-header">
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">
      <span class="knob">
        <span class="icon-sun" aria-hidden="true">☀</span>
        <span class="icon-moon" aria-hidden="true">🌙</span>
      </span>
    </button>
    <div class="eyebrow"><span class="pip"></span><span id="dateLabel">DAILY</span> · STREAK <span class="streak" id="streakNum">00</span></div>
    <h1 class="title">Mission&nbsp;Brief<span class="slash"> /04</span></h1>
    <div class="sub">DANIEL · LV.<span id="lvNum">01</span> · <span id="xpNum">0</span> XP TODAY</div>
  </header>

  <!-- SLOT 01 — daily rotating: AI / Photo / Riddle / Joke -->
  <article class="mission ai" id="card-slot1">
    <div class="mission-inner">
      <div class="mission-head">
        <div class="mission-label" id="slot1Label">AI Mission</div>
        <div class="mission-meta">01/04</div>
      </div>
      <p class="mission-q" id="slot1Task"></p>
      <div class="hint" id="slot1HintWrap">
        <span aria-hidden="true">💡</span>
        <div><span class="h-lbl" id="slot1HintLabel">Tip</span><span id="slot1Hint"></span></div>
      </div>
      <div class="slot1-reveal" id="slot1Reveal">
        <span class="h-lbl" id="slot1RevealLabel">Answer</span>
        <span id="slot1RevealText"></span>
      </div>
      <div class="slot1-action-row" id="slot1ActionRow">
        <!-- buttons inserted by JS per variant; mark-done is always last -->
      </div>
    </div>
  </article>

  <!-- MATH MISSION -->
  <article class="mission math" id="card-math">
    <div class="mission-inner">
      <div class="mission-head">
        <div class="mission-label">Math Mission</div>
        <div class="mission-meta">02/04</div>
      </div>
      <p class="mission-q" id="mathTask"></p>
      <p class="mission-eg" id="mathEg"></p>
      <div class="math-input-wrap" id="mathInputWrap">
        <input class="math-input" id="mathInput" type="text" inputmode="text" autocomplete="off"
               autocorrect="off" autocapitalize="none" spellcheck="false"
               placeholder="Type your answer" aria-label="Your answer" />
        <button class="math-check" type="button" id="mathCheck">CHECK ▸</button>
        <div class="xp-burst" id="xpBurst">+ 100 XP ▴</div>
      </div>
      <div class="math-state" id="mathState"></div>
      <div class="hint">
        <span aria-hidden="true">💡</span>
        <div><span class="h-lbl">Hint</span><span id="mathHint"></span></div>
      </div>
    </div>
  </article>

  <!-- TRIVIA MISSION -->
  <article class="mission trivia" id="card-trivia">
    <div class="mission-inner">
      <div class="mission-head">
        <div class="mission-label">Trivia Mission</div>
        <div class="mission-meta">03/04</div>
      </div>
      <p class="mission-q" id="triviaQ"></p>
      <div class="trivia-options" id="triviaOpts"></div>
      <div class="trivia-reveal" id="triviaReveal">
        <span class="h-lbl">Did you know</span>
        <span id="triviaFact"></span>
      </div>
      <button class="mark-done" type="button" data-mark="trivia">Mark done</button>
    </div>
  </article>

  <!-- DAILY QUOTE -->
  <article class="mission quote" id="card-quote">
    <div class="mission-inner">
      <div class="mission-head">
        <div class="mission-label">Daily Quote</div>
        <div class="mission-meta">04/04</div>
      </div>
      <p class="quote-text" id="quoteText"></p>
      <p class="quote-author" id="quoteAuthor"></p>
      <button class="favorite-btn" id="favBtn" type="button" aria-pressed="false">
        <span class="heart" aria-hidden="true">♡</span>
        <span class="fav-label">Favorite</span>
      </button>
    </div>
  </article>

  <button class="new-missions" type="button" id="newMissions">
    <span class="label">✦ NEW MISSIONS</span>
  </button>
  <div class="status-line">Missions refresh anytime · No score, no pressure</div>

  <footer class="app-footer">CREATED WITH <span class="heart">♥</span> FROM DAD FOR DANIEL</footer>
</main>

<script>
/* =========================================================================
   Daniel's Daily Missions — task bank
   Built procedurally so we have thousands of combinations and Daniel won't
   see repeats often. Templates are hand-written for a fun 11-year-old tone.
   ========================================================================= */

/* ---------- AI TASK BANK ---------- */

const AI_TOPICS = [
  "dinosaurs","space","sharks","pizza","robots","ninjas","dragons","volcanoes",
  "the ocean","cats","dogs","penguins","octopuses","Mars","black holes","pyramids",
  "Vikings","skateboarding","Minecraft","soccer","basketball","video games",
  "rollercoasters","chocolate","thunderstorms","earthquakes","jungles","deserts",
  "the Arctic","bamboo","knights","castles","pirates","submarines","rockets",
  "satellites","comets","meteors","tornadoes","whales","bees","ants","spiders",
  "bats","wolves","eagles","cheetahs","kangaroos","dolphins","chameleons",
  "lasers","holograms","virtual reality","Lego","Roblox","Mario","Zelda",
  "Pokémon","skiing","swimming","the Moon","Saturn's rings","quicksand",
  "mirrors","magnets","rainbows","clouds","parkour","BMX","pandas","koalas",
  "sloths","crocodiles","T-Rex","meerkats","samurai","aliens","UFOs",
  "the Sahara","the Amazon","the Great Wall","Mount Everest","the Titanic",
  "drones","electric cars","secret agents","spy gadgets","trampolines",
  "roller skates","pet hamsters","YouTube","time travel","parallel universes"
];

const AI_CONCEPTS = [
  "how Wi-Fi works","how rockets fly","how a volcano erupts","how fish sleep",
  "how the internet works","how rainbows form","how magnets work",
  "how your brain remembers things","how airplanes stay up","how GPS knows where you are",
  "how a camera takes a picture","how sound travels","how electricity works",
  "how a 3D printer works","how AI learns","how solar panels work",
  "how a submarine floats or sinks","how bees make honey","how your eyes see color",
  "how touchscreens work","how bridges don't fall down","how thunder happens"
];

const AI_CREATURES = [
  "dragon","wizard","robot","ninja","pirate","alien","detective","astronaut",
  "chef","inventor","explorer","knight","spy","scientist","skater","gamer",
  "shark","dinosaur","fox","wolf","penguin","octopus","ghost","cyborg"
];

const AI_ADJECTIVES = [
  "sneaky","heroic","clumsy","clever","super-fast","tiny","giant","invisible",
  "time-traveling","underwater","space-traveling","glow-in-the-dark","mischievous",
  "legendary","lazy but brilliant","secretly royal","robot-powered","noodle-armed"
];

const AI_SENTENCES = [
  "I am hungry","It is raining","My homework is done","The dog ate my sandwich",
  "I love pizza","School was fun today","I can't find my shoes","The cat stole my sock",
  "I need a snack","My Wi-Fi is slow","I won the game","I am tired"
];

const AI_THINGS = [
  "new ice cream flavor","pet robot","invisible superhero","secret treehouse",
  "brand-new sport","video game boss","magical pet","sneaker design",
  "pizza topping","cereal brand","candy bar","theme park ride","spy gadget",
  "space station","hidden hideout","imaginary island"
];

const AI_HYPOTHETICALS = [
  "gravity turned off for one minute","dogs could talk","school was only 2 hours a day",
  "pizza grew on trees","the sky was green","cats ruled the world",
  "we lived on Mars","homework was illegal","humans could fly",
  "water tasted like lemonade","you could pause time for 10 seconds a day",
  "every kid got a dragon as a pet","money was replaced by LEGO bricks"
];

const AI_STYLES = [
  "a dramatic movie trailer","a pirate","a sports announcer","a Shakespeare play",
  "a cowboy","a robot","a rapper","a tiny mouse","an action hero","a news reporter"
];

const AI_TEMPLATES = [
  { make: t => ({
      task: `Ask AI for 3 cool facts about ${t.topic}.`,
      hint: `Try typing: <b>"Give me 3 cool facts about ${t.topic} that most kids don't know."</b> Ask for another one if a fact sounds boring.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to explain ${t.concept} like you're 11.`,
      hint: `Try: <b>"Explain ${t.concept} to an 11-year-old, and use an example I'd recognize."</b>` }),
    needs: ["concept"] },
  { make: t => ({
      task: `Ask AI to invent a character who is a ${t.adj} ${t.creature}.`,
      hint: `Ask for a <b>name</b>, a <b>special power</b>, and one <b>silly weakness</b>. That's what makes them memorable.` }),
    needs: ["adj","creature"] },
  { make: t => ({
      task: `Ask AI to rewrite the sentence "${t.sentence}" in the style of ${t.style}.`,
      hint: `If it's not funny enough, say <b>"make it even more over-the-top"</b> and try again.` }),
    needs: ["sentence","style"] },
  { make: t => ({
      task: `Ask AI for a joke about ${t.topic}.`,
      hint: `If the joke is weak, say <b>"tell me a funnier one."</b> You're allowed to be picky.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to come up with 5 cool names for a ${t.thing}.`,
      hint: `Pick your favorite, then ask AI <b>"why does that name work?"</b>` }),
    needs: ["thing"] },
  { make: t => ({
      task: `Ask AI to write a tiny 3-sentence story about ${t.topic}.`,
      hint: `Ask for a <b>surprise twist at the end</b>. Twists make stories way better.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI: "What would happen if ${t.hypo}?"`,
      hint: `There's no wrong answer — it's a thought experiment. Ask for <b>3 weird side effects</b>.` }),
    needs: ["hypo"] },
  { make: t => ({
      task: `Ask AI to design a superpower based on ${t.topic}.`,
      hint: `Ask what the <b>weakness</b> of that power would be. Every good superpower has one.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a riddle about ${t.topic}.`,
      hint: `Try to solve it yourself first. If you're stuck, ask for a <b>small clue</b> before the answer.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to compare ${t.topic} and ${t.topic2}. Which would win in a contest?`,
      hint: `Ask AI to pick the <b>contest rules</b> itself — it gets more creative that way.` }),
    needs: ["topic","topic2"] },
  { make: t => ({
      task: `Ask AI for 5 fun questions you could ask your friends about ${t.topic}.`,
      hint: `Pick the best one and actually ask someone today. That's the mission bonus.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to help you invent a brand new ${t.thing}.`,
      hint: `Tell it <b>what problem your invention solves</b>. Good inventions fix something annoying.` }),
    needs: ["thing"] },
  { make: t => ({
      task: `Ask AI to describe ${t.topic} as if it were a video game level.`,
      hint: `Ask for the <b>boss, the power-ups, and the music</b>.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to make up a secret code based on ${t.topic}.`,
      hint: `Ask AI to give you a <b>sample message</b> in the code, then try to decode it.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI for a tongue twister about ${t.topic}.`,
      hint: `Say it out loud 3 times fast. That's the real test.` }),
    needs: ["topic"] },
  { make: t => ({
      task: `Ask AI to imagine a world where ${t.hypo}. Describe one normal day.`,
      hint: `Ask what <b>breakfast</b> would look like. Small details make worlds feel real.` }),
    needs: ["hypo"] },
  { make: t => ({
      task: `Ask AI to write a short rap about ${t.topic}.`,
      hint: `Ask for it to <b>rhyme</b> and have a beat you can clap to.` }),
    needs: ["topic"] },

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickDiff(arr, not) {
  let v; do { v = pick(arr); } while (v === not);
  return v;
}

function buildAITask() {
  const tpl = pick(AI_TEMPLATES);
  const ctx = {};
  if (tpl.needs.includes("topic")) ctx.topic = pick(AI_TOPICS);
  if (tpl.needs.includes("topic2")) ctx.topic2 = pickDiff(AI_TOPICS, ctx.topic);
  if (tpl.needs.includes("concept")) ctx.concept = pick(AI_CONCEPTS);
  if (tpl.needs.includes("creature")) ctx.creature = pick(AI_CREATURES);
  if (tpl.needs.includes("adj")) ctx.adj = pick(AI_ADJECTIVES);
  if (tpl.needs.includes("sentence")) ctx.sentence = pick(AI_SENTENCES);
  if (tpl.needs.includes("thing")) ctx.thing = pick(AI_THINGS);
  if (tpl.needs.includes("hypo")) ctx.hypo = pick(AI_HYPOTHETICALS);
  if (tpl.needs.includes("style")) ctx.style = pick(AI_STYLES);
  return tpl.make(ctx);
}

/* Quick sanity: count the combinatorial space so we know we easily clear 1000. */
function aiBankSize() {
  let total = 0;
  for (const t of AI_TEMPLATES) {
    let n = 1;
    if (t.needs.includes("topic")) n *= AI_TOPICS.length;
    if (t.needs.includes("topic2")) n *= (AI_TOPICS.length - 1);
    if (t.needs.includes("concept")) n *= AI_CONCEPTS.length;
    if (t.needs.includes("creature")) n *= AI_CREATURES.length;
    if (t.needs.includes("adj")) n *= AI_ADJECTIVES.length;
    if (t.needs.includes("sentence")) n *= AI_SENTENCES.length;
    if (t.needs.includes("thing")) n *= AI_THINGS.length;
    if (t.needs.includes("hypo")) n *= AI_HYPOTHETICALS.length;
    if (t.needs.includes("style")) n *= AI_STYLES.length;
    total += n;
  }
  return total;
}

function r(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function gcd(a, b) { a = Math.abs(a); b = Math.abs(b); return b === 0 ? a : gcd(b, a % b); }

/* ---------- Answer normalization + checkers ---------- */

function norm(s) {
  return String(s == null ? "" : s).trim().toLowerCase()
    .replace(/\s+/g, " ")
    .replace(/×/g, "*").replace(/÷/g, "/").replace(/−/g, "-")
    .replace(/[,$€£]/g, "");
}

function simplifyFrac(n, d) {
  if (d === 0) return [n, d];
  if (d < 0) { n = -n; d = -d; }
  const g = gcd(n, d) || 1;
  return [n / g, d / g];
}

function parseFrac(raw) {
  const s = norm(raw);
  if (!s) return null;
  let m = s.match(/^(-?\d+)\s+(\d+)\/(\d+)$/); // mixed "3 1/4"
  if (m) {
    const w = parseInt(m[1]), n = parseInt(m[2]), d = parseInt(m[3]);
    const sign = w < 0 ? -1 : 1;
    if (d === 0) return null;
    return [sign * (Math.abs(w) * d + n), d];
  }
  m = s.match(/^(-?\d+)\/(-?\d+)$/);
  if (m) { const d = parseInt(m[2]); if (d === 0) return null; return [parseInt(m[1]), d]; }
  m = s.match(/^-?\d+$/);
  if (m) return [parseInt(s), 1];
  m = s.match(/^(-?)(\d*)\.(\d+)$/);
  if (m) {
    const sign = m[1] === "-" ? -1 : 1;
    const whole = m[2] === "" ? 0 : parseInt(m[2]);
    const frac = m[3];
    const denom = Math.pow(10, frac.length);
    return [sign * (whole * denom + parseInt(frac)), denom];
  }
  return null;
}

// Answer-maker helpers. Each returns { check(input), canonical }.
function ansNum(v) {
  return {
    check: (s) => {
      const t = norm(s);
      if (t === "") return false;
      const n = Number(t);
      if (Number.isFinite(n)) return Math.abs(n - v) < 1e-9;
      return false;
    },
    canonical: (Number.isInteger(v) ? String(v) : String(v))
  };
}
function ansFrac(n, d) {
  const [cn, cd] = simplifyFrac(n, d);
  return {
    check: (s) => {
      const p = parseFrac(s);
      if (!p) return false;
      const [a, b] = simplifyFrac(p[0], p[1]);
      return a === cn && b === cd;
    },
    canonical: cd === 1 ? String(cn) : `${cn}/${cd}`
  };
}
function ansTime(h, m) {
  const canon = `${h}:${String(m).padStart(2, "0")}`;
  return {
    check: (s) => {
      const t = norm(s).replace(/\s*(am|pm)$/, "");
      const mt = t.match(/^(\d{1,2})[:. ](\d{1,2})$/);
      if (!mt) return false;
      const hh = parseInt(mt[1]), mm = parseInt(mt[2]);
      return (hh === h || hh === h % 12 || hh === h + 12) && mm === m;
    },
    canonical: canon
  };
}
function ansRem(q, r) {
  const canon = r === 0 ? String(q) : `${q} R ${r}`;
  return {
    check: (s) => {
      const t = norm(s);
      if (r === 0) { const n = Number(t); return Number.isFinite(n) && n === q; }
      const m1 = t.match(/^(-?\d+)\s*r(?:em(?:ainder)?)?\s*\.?\s*(\d+)$/);
      if (m1) return parseInt(m1[1]) === q && parseInt(m1[2]) === r;
      const m2 = t.match(/^(-?\d+)\s+(\d+)$/); // "5 3"
      if (m2) return parseInt(m2[1]) === q && parseInt(m2[2]) === r;
      return false;
    },
    canonical: canon
  };
}
function ansYesNo(v) {
  return {
    check: (s) => {
      const t = norm(s).split(" ")[0];
      return (v ? ["y","yes","yeah","yep","true"] : ["n","no","nope","false"]).includes(t);
    },
    canonical: v ? "yes" : "no"
  };
}
function ansHM(h, m) {
  // "2 hours 15 minutes" / "2h 15m" / "2:15" / "2 15"
  const canon = `${h}h ${m}m`;
  return {
    check: (s) => {
      const t = norm(s);
      let mt = t.match(/^(\d+)\s*(?:h|hr|hrs|hour|hours)?\s*(\d+)\s*(?:m|min|mins|minute|minutes)?$/);
      if (mt) return parseInt(mt[1]) === h && parseInt(mt[2]) === m;
      mt = t.match(/^(\d+)[:h ](\d+)m?$/);
      if (mt) return parseInt(mt[1]) === h && parseInt(mt[2]) === m;
      return false;
    },
    canonical: canon
  };
}
function ansPrimeFact(n) {
  // Compute canonical factorization
  const factors = [];
  let x = n;
  for (let p = 2; p * p <= x; p++) {
    while (x % p === 0) { factors.push(p); x = x / p; }
  }
  if (x > 1) factors.push(x);
  const canon = factors.join(" × ");
  function isPrime(k) {
    if (k < 2) return false;
    for (let i = 2; i * i <= k; i++) if (k % i === 0) return false;
    return true;
  }
  return {
    check: (s) => {
      const t = norm(s).replace(/\*/g, " ").replace(/\s+/g, " ").trim();
      const parts = t.split(/[\s,]+/).filter(Boolean);
      if (parts.length === 0) return false;
      const nums = parts.map(p => {
        // handle 2^3 notation too
        const m = p.match(/^(\d+)\^(\d+)$/);
        if (m) return { base: parseInt(m[1]), exp: parseInt(m[2]) };
        const n = parseInt(p);
        if (isNaN(n)) return null;
        return { base: n, exp: 1 };
      });
      if (nums.some(v => v === null)) return false;
      let product = 1;
      for (const v of nums) {
        if (!isPrime(v.base)) return false;
        product *= Math.pow(v.base, v.exp);
      }
      return product === n;
    },
    canonical: canon
  };
}
function ansAny(opts) { // opts: array of answer-checker objects
  return {
    check: (s) => opts.some(o => o.check(s)),
    canonical: opts[0].canonical
  };
}

function buildTrivia() {
  const item = pick(TRIVIA);
  const [q, correct, distractors, fact] = item;
  const opts = [correct, ...distractors];
  // shuffle
  for (let i = opts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [opts[i], opts[j]] = [opts[j], opts[i]];
  }
  return { q, correct, opts, fact };
}

}

/* ---------- Cross-session no-repeat tracking ---------- */
const SEEN_CAPS = { ai: 200, math: 200, trivia: 110, quote: 130, photo: 60, riddle: 70, joke: 70 };
function loadSeen(k) {
  try { return JSON.parse(localStorage.getItem("ddm_seen_" + k) || "[]"); }
  catch (e) { return []; }
}
function saveSeen(k, arr) {
  try { localStorage.setItem("ddm_seen_" + k, JSON.stringify(arr)); } catch (e) {}
}
const SEEN = {
  ai: loadSeen("ai"),
  math: loadSeen("math"),
  trivia: loadSeen("trivia"),
  quote: loadSeen("quote"),
  photo: loadSeen("photo"),
  riddle: loadSeen("riddle"),
  joke: loadSeen("joke"),
};
function markSeen(kind, id) {
  const arr = SEEN[kind];
  const idx = arr.indexOf(id);
  if (idx !== -1) arr.splice(idx, 1);
  arr.push(id);
  while (arr.length > SEEN_CAPS[kind]) arr.shift();
  saveSeen(kind, arr);
}
function isSeen(kind, id) { return SEEN[kind].indexOf(id) !== -1; }
function pickUnseen(kind, builder, idOf, maxTries) {
  let best = null;
  for (let i = 0; i < (maxTries || 40); i++) {
    const c = builder();
    const id = idOf(c);
    if (!isSeen(kind, id)) return c;
    if (!best) best = c;
  }
  return best;
}

/* ---------- Streak / XP ---------- */
function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function initDailyCounters() {
  const today = todayStr();
  const lastXpDate = localStorage.getItem("ddm_xp_date");
  if (lastXpDate !== today) {
    localStorage.setItem("ddm_xp", "0");
    localStorage.setItem("ddm_xp_date", today);
    // gap check for streak
    const lastStreak = localStorage.getItem("ddm_streak_last");
    if (lastStreak && lastStreak !== yesterdayStr() && lastStreak !== today) {
      // missed a day — reset streak
      localStorage.setItem("ddm_streak", "0");
    }
  }
}
function getXp()     { return parseInt(localStorage.getItem("ddm_xp") || "0", 10); }
function getStreak() { return parseInt(localStorage.getItem("ddm_streak") || "0", 10); }
function paintCounters() {
  const xp = getXp();
  const streak = getStreak();
  // Level: 1 per 200 XP earned ever (simple lifetime counter)
  const lvFromXp = Math.max(1, Math.floor(getLifetimeXp() / 200) + 1);
  els.streakNum.textContent = String(streak).padStart(2, "0");
  els.lvNum.textContent     = String(lvFromXp).padStart(2, "0");
  els.xpNum.textContent     = String(xp);
}
function getLifetimeXp() { return parseInt(localStorage.getItem("ddm_xp_total") || "0", 10); }
function awardMissionXp() {
  // +25 per mission completed, capped at 100/day
  const cur = Math.min(100, getXp() + 25);
  localStorage.setItem("ddm_xp", String(cur));
  const total = getLifetimeXp() + 25;
  localStorage.setItem("ddm_xp_total", String(total));
  // streak: bump once per day at first completion
  const today = todayStr();
  const lastStreak = localStorage.getItem("ddm_streak_last");
  if (lastStreak !== today) {
    const s = getStreak() + 1;
    localStorage.setItem("ddm_streak", String(s));
    localStorage.setItem("ddm_streak_last", today);
  }
  paintCounters();
}

/* ---------- Date header ---------- */
function paintDate() {

  const days   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  els.dateLabel.textContent = `DAILY · ${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
}

/* ---------- AI: derive a clean copyable prompt ---------- */
function deriveAIPrompt(task) {
  let p = String(task || "").trim();
  // strip prefixes
  p = p.replace(/^Ask AI to /i, "");
  p = p.replace(/^Ask AI for /i, "Give me ");
  p = p.replace(/^Ask AI:\s*/i, "");
  // strip wrapping quotes
  p = p.replace(/^["“'']+/, "").replace(/["”'']+$/, "");
  // strip trailing period for cleaner pasting? keep — feels more natural
  if (p.length) p = p.charAt(0).toUpperCase() + p.slice(1);
  return p;
}

const SLOT1_META = {
  ai:     { label: "AI Mission",     hintLabel: "Tip",      revealLabel: "Reveal" },
  photo:  { label: "Photo Mission",  hintLabel: "Idea",     revealLabel: "Reveal" },
  riddle: { label: "Riddle Mission", hintLabel: "Hint",     revealLabel: "Answer" },
  joke:   { label: "Joke Mission",   hintLabel: "Delivery", revealLabel: "Punchline" }
};
function daysSinceEpoch(date) {
  const d = date || new Date();
  return Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / 86400000);
}
function getSlot1Variant() {
  const today = daysSinceEpoch();
  let installDay = parseInt(localStorage.getItem("ddm_slot1_install_day") || "", 10);
  if (!Number.isFinite(installDay)) {
    installDay = today;
    try { localStorage.setItem("ddm_slot1_install_day", String(installDay)); } catch (e) {}
  }
  const idx = ((today - installDay) % 4 + 4) % 4;
  return SLOT1_VARIANTS[idx];
}

function mkActionBtn(labelText) {
  const btn = document.createElement("button");

async function copyPromptText(btn, text, doneLabel, restoreLabel) {
  let copied = false;
  try { await navigator.clipboard.writeText(text); copied = true; } catch (e) {}
  if (!copied) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); copied = true; } catch (e) {}
    document.body.removeChild(ta);
  }
  const originalLabel = btn.querySelector(".copy-label").textContent;
  const okLabel = doneLabel || "✓ Copied";
  const back = restoreLabel || originalLabel;
  btn.classList.add("copied");
  btn.querySelector(".copy-label").textContent = okLabel;
  setTimeout(() => {
    btn.classList.remove("copied");
    btn.querySelector(".copy-label").textContent = back;
  }, 1600);
}

/* ---------- Math check ---------- */
function checkMath() {
  const raw = els.mathInput.value;
  if (!raw.trim()) return;
  const task = state.current.math;
  if (!task || !task.answer) return;
  state.attempts++;
  els.mathState.className = "math-state"; // reset
  if (task.answer.check(raw)) {
    addCorrectFx(task);
  } else {
    addWrongFx();
  }
}
function addCorrectFx(task) {
  els.mathState.textContent = `✓ NICE WORK — ${task.answer.canonical}`;
  els.mathState.classList.add("show", "correct");
  els.mathCard.classList.add("celebrate");
  els.xpBurst.classList.remove("fire");
  void els.xpBurst.offsetWidth; // reflow to retrigger
  els.xpBurst.classList.add("fire");
  if (navigator.vibrate) navigator.vibrate(10);
  setTimeout(() => els.mathCard.classList.remove("celebrate"), 900);
  els.mathInput.disabled = true;
  els.mathCheck.disabled = true;
  if (!state.doneMath) {
    state.doneMath = true;
    awardMissionXp();
  }
}
function addWrongFx() {
  const msg = state.attempts >= 3
    ? `Not quite — keep trying! <span class="reveal-link" id="revealLink">Show answer</span>`
    : pickWrongNudge();
  els.mathState.innerHTML = msg;
  els.mathState.classList.add("show", "wrong");
  els.mathInputWrap.classList.remove("shake");
  void els.mathInputWrap.offsetWidth;
  els.mathInputWrap.classList.add("shake");
  els.mathInput.select();
  const rl = document.getElementById("revealLink");
  if (rl) rl.addEventListener("click", revealAnswer);
}
function revealAnswer() {
  const task = state.current.math;
  if (!task) return;
  els.mathInput.value = task.answer.canonical;
  els.mathInput.disabled = true;
  els.mathCheck.disabled = true;
  els.mathState.innerHTML = `Answer: <b>${task.answer.canonical}</b>`;
  els.mathState.className = "math-state show wrong";
}
const WRONG_NUDGES = [
  "Not quite — take another shot!",
  "Close one. Try again!",
  "Almost! Check the hint 👇",
  "Not yet — you've got this.",
  "Hmm, not it. Give it one more try!",
];
function pickWrongNudge() { return WRONG_NUDGES[Math.floor(Math.random() * WRONG_NUDGES.length)]; }

/* ---------- Trivia handler ---------- */
function handleTrivia(btn) {
  if (state.triviaAnswered) return;
  state.triviaAnswered = true;
  const correctKey = els.triviaOpts.dataset.correct;
  const isCorrect = btn.dataset.key === correctKey;
  els.triviaOpts.querySelectorAll(".trivia-opt").forEach(o => {
    o.setAttribute("aria-pressed", o === btn ? "true" : "false");
    o.classList.remove("correct", "wrong");
    if (o.dataset.key === correctKey) o.classList.add("correct");
  });
  if (!isCorrect) btn.classList.add("wrong");
  els.triviaReveal.classList.add("show");
  if (isCorrect && navigator.vibrate) navigator.vibrate(10);
  if (isCorrect && !state.doneTrivia) {
    state.doneTrivia = true;
    const markBtn = els.triviaCard.querySelector('.mark-done');
    els.triviaCard.classList.add("done");
    markBtn.textContent = "Done";

/* ---------- Refresh (new missions) ---------- */
function pickSlot1(variant) {
  if (variant === "ai")     return pickUnseen("ai",     buildAITask, t => t.task);
  if (variant === "photo")  return pickUnseen("photo",  buildPhoto,  t => t.task);
  if (variant === "riddle") return pickUnseen("riddle", buildRiddle, t => t.task);
  if (variant === "joke")   return pickUnseen("joke",   buildJoke,   t => t.setup);
  return buildAITask();
}
function slot1Id(variant, data) {
  return variant === "joke" ? data.setup : data.task;
}

function refresh() {
  const variant = state.slot1Variant;
  const slot1   = pickSlot1(variant);
  const math    = pickUnseen("math",   buildMathTask,  t => t.task);
  const trivia  = pickUnseen("trivia", buildTrivia,    t => t.q);
  const quote   = pickUnseen("quote",  buildQuote,     q => q.author + "::" + q.text);

  markSeen(variant,   slot1Id(variant, slot1));
  markSeen("math",    math.task);
  markSeen("trivia",  trivia.q);
  markSeen("quote",   quote.author + "::" + quote.text);

  state.current.slot1 = slot1;
  state.current.math = math;
  state.current.trivia = trivia;
  state.current.quote = quote;
  state.doneSlot1 = state.doneMath = state.doneTrivia = false;

  renderSlot1();
  renderMath(math);
  renderTrivia(trivia);
  renderQuote(quote);

  // reset card "done" classes (slot1 mark-done is recreated per render, others stay)
  document.querySelectorAll(".mission.done").forEach(c => c.classList.remove("done"));
  document.querySelectorAll('.mark-done[data-mark="trivia"]').forEach(b => b.textContent = "Mark done");
}

els.newMissions.addEventListener("click", () => {
  const cards = document.querySelectorAll(".mission");
  cards.forEach((c) => {
    c.style.transition = "opacity 200ms ease, transform 200ms ease";
    c.style.opacity = "0.3";
    c.style.transform = "translateY(4px) scale(0.995)";
  });
  if (navigator.vibrate) navigator.vibrate(8);
  setTimeout(() => {
    refresh();
    cards.forEach((c, i) => {
      setTimeout(() => {
        c.style.opacity = ""; c.style.transform = ""; c.style.transition = "";
      }, i * 60);
    });
  }, 220);
});

/* ============= BOSS BATTLE ============= */
function findBossById(id) { return BOSSES.find(b => b.id === id); }
function pickNextBossId(completedList) {
  // Avoid the most-recent 5 done; cycle through the remaining.
  const recent = (completedList || []).slice(-5);
  const fresh  = BOSSES.filter(b => !recent.includes(b.id));
  const pool   = fresh.length ? fresh : BOSSES;
  return pool[Math.floor(Math.random() * pool.length)].id;
}
function loadBossProgress() {
  try { return JSON.parse(localStorage.getItem("ddm_boss_progress") || "[]"); }
  catch (e) { return []; }
}
function loadBossCompleted() {
  try { return JSON.parse(localStorage.getItem("ddm_boss_completed") || "[]"); }
  catch (e) { return []; }
}
function ensureActiveBoss() {
  const today = todayStr();
  let id  = localStorage.getItem("ddm_boss_active_id");
  let boss = id ? findBossById(id) : null;
  const lastDefeated = localStorage.getItem("ddm_boss_last_completed_date");

  // If the active boss was just defeated today, hold the victory state.
  if (boss && lastDefeated === today) {
    return { boss, defeatedToday: true, progress: loadBossProgress() };
  }
  // If the active boss was defeated on a prior day, start a fresh boss.
  if (!boss || lastDefeated) {
    const completed = loadBossCompleted();
    id = pickNextBossId(completed);
    boss = findBossById(id);
    try {
      localStorage.setItem("ddm_boss_active_id", id);
      localStorage.setItem("ddm_boss_progress", "[]");
      localStorage.setItem("ddm_boss_started",  today);
      localStorage.removeItem("ddm_boss_last_completed_date");
    } catch (e) {}
  }
  return { boss, defeatedToday: false, progress: loadBossProgress() };
}

function renderBoss() {
  const data = ensureActiveBoss();
  state.boss = data;
  const { boss, defeatedToday, progress } = data;
  const today = todayStr();
  const markedToday = progress.includes(today);
  const dayIndex = markedToday ? progress.length : progress.length + 1; // 1-based
  const totalDays = boss.days;
  const nudge = boss.nudges[Math.min(progress.length, totalDays - 1)];
  const completedCount = progress.length;
  const isFinal = (dayIndex === totalDays);

  els.bossCard.classList.toggle("defeated", defeatedToday);

  if (defeatedToday) {
    els.bossInner.innerHTML = `
      <div class="boss-eyebrow"><span>BOSS BATTLE</span><span class="boss-day">DEFEATED</span></div>
      <div class="boss-title">${escapeHtml(boss.title)}</div>
      <div class="boss-defeated-stamp">★ VICTORY ★</div>
      <div class="boss-tagline">${escapeHtml(boss.tagline)}</div>
      <div class="boss-next-up">Next boss · tomorrow</div>
    `;
    return;
  }

  // Progress dots
  let dotsHtml = "";
  for (let i = 0; i < totalDays; i++) {
    let cls = "boss-dot";
    if (i < completedCount) cls += " filled";
    else if (i === completedCount && !markedToday) cls += " today";
    dotsHtml += `<span class="${cls}"></span>`;
  }

  const todayTag = isFinal ? `<span class="today-tag" style="color:var(--gold); background:color-mix(in oklab, var(--gold), transparent 86%);">FINAL DAY</span>` : `<span class="today-tag">TODAY</span>`;
  const btnLabel = markedToday
    ? (isFinal ? "✓ BOSS DEFEATED" : "✓ DONE FOR TODAY")
    : (isFinal ? "FINISH IT · +125 XP" : "Mark today done");

  els.bossInner.innerHTML = `
    <div class="boss-eyebrow"><span>BOSS BATTLE</span><span class="boss-day">DAY ${dayIndex} / ${totalDays}</span></div>
    <div class="boss-title">${escapeHtml(boss.title)}</div>
    <div class="boss-tagline">${escapeHtml(boss.tagline)}</div>
    <div class="boss-dots">${dotsHtml}</div>
    <div class="boss-nudge">${todayTag}${escapeHtml(nudge)}</div>
    <button id="bossMarkBtn" class="boss-mark${markedToday ? " done-today" : ""}" type="button" ${markedToday ? "disabled" : ""}>${btnLabel}</button>
  `;
  const btn = document.getElementById("bossMarkBtn");
  if (btn && !markedToday) {
    btn.addEventListener("click", () => markBossToday());
  }
}

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function markBossToday() {
  const { boss, progress } = state.boss;
  const today = todayStr();
  if (progress.includes(today)) return;
  progress.push(today);
  try { localStorage.setItem("ddm_boss_progress", JSON.stringify(progress)); } catch (e) {}
  const isFinal = progress.length >= boss.days;
  if (isFinal) {
    const completed = loadBossCompleted();
    completed.push(boss.id);
    // keep last 5 only to avoid runaway storage
    while (completed.length > 5) completed.shift();
    try {
      localStorage.setItem("ddm_boss_completed", JSON.stringify(completed));
      localStorage.setItem("ddm_boss_last_completed_date", today);
    } catch (e) {}
    awardBossFinaleXp(125);
    fireBossVictory();
  } else {
    awardMissionXp();
    if (navigator.vibrate) navigator.vibrate(10);
  }
  renderBoss();
}

function awardBossFinaleXp(amount) {
  // Bypasses the 100/day cap.
  const cur = getXp() + amount;
  try { localStorage.setItem("ddm_xp", String(cur)); } catch (e) {}
  const total = getLifetimeXp() + amount;
  try { localStorage.setItem("ddm_xp_total", String(total)); } catch (e) {}
  const today = todayStr();
  const lastStreak = localStorage.getItem("ddm_streak_last");
  if (lastStreak !== today) {
    const s = getStreak() + 1;
    try {
      localStorage.setItem("ddm_streak", String(s));
      localStorage.setItem("ddm_streak_last", today);
    } catch (e) {}
  }
  paintCounters();
}

function fireBossVictory() {
  // Big mid-screen XP burst
  let burst = document.getElementById("bossVictoryBurst");
  if (!burst) {
    burst = document.createElement("div");
    burst.id = "bossVictoryBurst";
    burst.className = "xp-burst-boss";
    document.body.appendChild(burst);
  }
  burst.textContent = "★ BOSS DEFEATED · +125 XP ★";
  burst.classList.remove("fire");
  void burst.offsetWidth;
  burst.classList.add("fire");
  if (navigator.vibrate) navigator.vibrate([30, 60, 30, 60, 60]);
}

/* ---------- Theme ---------- */
(function initTheme() {
  const STORAGE_KEY = "ddm-theme";
  const root = document.documentElement;
  const themeMeta = document.querySelector('meta[name="theme-color"]:not([media])');
  function paintMeta(t) {
    if (themeMeta) themeMeta.setAttribute("content", t === "dark" ? "#06060d" : "#f6f2e9");
  }
  paintMeta(root.getAttribute("data-theme"));
  els.themeToggle.addEventListener("click", () => {
    const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next);
    try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
    paintMeta(next);
  });
  if (window.matchMedia) {
    matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", e => {
      try {
        if (localStorage.getItem(STORAGE_KEY)) return;
        const next = e.matches ? "dark" : "light";
        root.setAttribute("data-theme", next);
        paintMeta(next);
      } catch (err) {}
    });
  }
})();

/* ---------- Boot ---------- */
initDailyCounters();
paintCounters();
paintDate();
state.slot1Variant = getSlot1Variant();   // pinned at page load (no mid-session flip)
renderBoss();
refresh();
</script>
</body>
</html>
